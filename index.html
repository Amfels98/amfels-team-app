<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Am Fels – Team</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a0a0a">
  <link rel="manifest" href="manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #b8924a; --bg: #0a0a0a; --bg2: #131313; --bg3: #1c1c1c; --bg4: #252525;
      --border: rgba(255,255,255,0.07); --text: #f0ebe2; --dim: #666;
      --green: #4caf7d; --red: #e05252; --blue: #5b8dee; --orange: #e8924a;
    }
    html, body { height: 100%; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; -webkit-font-smoothing: antialiased; }
    #app { display: flex; flex-direction: column; height: 100%; height: 100dvh; }

    /* Header */
    .hdr { background: var(--bg2); border-bottom: 1px solid var(--border); padding: max(0.8rem, env(safe-area-inset-top)) 1.15rem 0.65rem; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .hdr-brand { font-size: 0.88rem; font-weight: 600; }
    .hdr-sub { font-size: 0.62rem; color: var(--gold); letter-spacing: 0.05em; margin-top: 0.05rem; }
    .hdr-r { display: flex; align-items: center; gap: 0.55rem; }
    .hdr-time { font-size: 0.72rem; color: var(--dim); font-variant-numeric: tabular-nums; }
    .uchip { background: var(--bg3); border: 1px solid var(--border); border-radius: 20px; padding: 0.3rem 0.75rem; font-size: 0.7rem; color: var(--dim); cursor: pointer; display: flex; align-items: center; gap: 0.3rem; -webkit-tap-highlight-color: transparent; touch-action: manipulation; user-select: none; }
    .udot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); }

    /* Content */
    .content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 0.9rem; }
    .screen { display: none; }
    .screen.on { display: block; }

    /* Chat (separate from .content for internal scrolling) */
    #chatWrap { flex: 1; display: none; flex-direction: column; overflow: hidden; min-height: 0; }
    #chatWrap.on { display: flex; }
    #chatMsgs { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 0.9rem; }
    .chat-row { display: flex; gap: 0.5rem; padding: 0.75rem; border-top: 1px solid var(--border); background: var(--bg); padding-bottom: max(0.75rem, env(safe-area-inset-bottom)); flex-shrink: 0; }
    .bubble-wrap { margin-bottom: 0.65rem; }
    .bubble-wrap.mine { display: flex; flex-direction: column; align-items: flex-end; }
    .bubble-wrap.other { display: flex; flex-direction: column; align-items: flex-start; }
    .bubble { padding: 0.6rem 0.9rem; border-radius: 18px; font-size: 0.88rem; max-width: 80%; line-height: 1.45; word-break: break-word; }
    .bubble-wrap.mine .bubble { background: var(--gold); color: #000; border-radius: 18px 18px 4px 18px; }
    .bubble-wrap.other .bubble { background: var(--bg3); border-radius: 18px 18px 18px 4px; }
    .bubble-who { font-size: 0.65rem; color: var(--dim); margin-bottom: 0.2rem; }
    .bubble-time { font-size: 0.6rem; color: var(--dim); margin-top: 0.2rem; }

    /* Bottom Nav */
    .bnav { background: var(--bg2); border-top: 1px solid var(--border); display: flex; padding-bottom: env(safe-area-inset-bottom); flex-shrink: 0; }
    .ni { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 0.55rem 0.2rem; color: var(--dim); font-size: 0.55rem; letter-spacing: 0.04em; text-transform: uppercase; gap: 0.2rem; border: none; background: none; font-family: 'Inter', sans-serif; cursor: pointer; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
    .ni.on { color: var(--gold); }
    .ni-icon { font-size: 1.1rem; line-height: 1; }

    /* Cards / UI */
    .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; padding: 1rem; margin-bottom: 0.75rem; }
    .sh { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.85rem; }
    .st { font-size: 0.98rem; font-weight: 600; }
    .add-btn { background: var(--gold); color: #000; border: none; width: 29px; height: 29px; border-radius: 50%; font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
    .inp { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 12px; padding: 0.75rem 1rem; font-family: 'Inter', sans-serif; font-size: 0.88rem; color: var(--text); outline: none; -webkit-appearance: none; }
    .inp:focus { border-color: var(--gold); }
    .btn-gold { width: 100%; background: var(--gold); color: #000; border: none; padding: 0.85rem; border-radius: 14px; font-family: 'Inter', sans-serif; font-size: 0.88rem; font-weight: 700; cursor: pointer; touch-action: manipulation; }
    .btn-dim { width: 100%; background: var(--bg3); color: var(--dim); border: 1px solid var(--border); padding: 0.85rem; border-radius: 14px; font-family: 'Inter', sans-serif; font-size: 0.88rem; cursor: pointer; touch-action: manipulation; }
    .add-form { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 1rem; margin-bottom: 1rem; display: none; }
    .add-form.open { display: block; }
    .fg { margin-bottom: 0.65rem; }
    .fl { font-size: 0.62rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--dim); display: block; margin-bottom: 0.35rem; }
    .row2 { display: flex; gap: 0.5rem; }

    /* Tasks */
    .task { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 0.75rem 1rem; margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.75rem; cursor: pointer; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
    .task.done { opacity: 0.42; }
    .t-check { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; background: transparent; }
    .task.done .t-check { background: var(--green); border-color: var(--green); color: #fff; }
    .t-title { font-size: 0.88rem; }
    .task.done .t-title { text-decoration: line-through; }
    .t-meta { font-size: 0.65rem; color: var(--dim); margin-top: 0.15rem; }
    .del { background: none; border: none; color: var(--dim); font-size: 1rem; cursor: pointer; padding: 0.25rem; flex-shrink: 0; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }

    /* Filter chips */
    .chips { display: flex; gap: 0.4rem; margin-bottom: 0.75rem; overflow-x: auto; padding-bottom: 0.25rem; }
    .chip { background: var(--bg3); color: var(--dim); border: 1px solid var(--border); border-radius: 20px; padding: 0.3rem 0.85rem; font-size: 0.75rem; cursor: pointer; white-space: nowrap; font-family: 'Inter', sans-serif; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
    .chip.on { background: var(--gold); color: #000; border-color: var(--gold); }

    /* Orders */
    .order { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 0.75rem 1rem; margin-bottom: 0.5rem; display: flex; justify-content: space-between; align-items: center; }
    .o-name { font-size: 0.88rem; }
    .o-qty { font-size: 0.75rem; color: var(--dim); margin-top: 0.1rem; }

    /* Shifts */
    .shift-day { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 0.75rem 1rem; margin-bottom: 0.5rem; }
    .sd-name { font-size: 0.7rem; font-weight: 600; color: var(--gold); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.45rem; }
    .sd-row { display: flex; justify-content: space-between; align-items: center; padding: 0.25rem 0; font-size: 0.82rem; border-top: 1px solid var(--border); }
    .sd-badge { font-size: 0.65rem; background: var(--bg4); border-radius: 6px; padding: 0.12rem 0.4rem; color: var(--dim); }

    /* Dashboard */
    .dash-welcome { text-align: center; padding: 1.5rem 1rem 1rem; }
    .dw-emoji { font-size: 2.5rem; margin-bottom: 0.4rem; }
    .dw-name { font-size: 1.35rem; font-weight: 300; letter-spacing: -0.02em; margin-bottom: 0.2rem; }
    .dw-date { font-size: 0.72rem; color: var(--dim); }
    .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; margin: 0.75rem 0; }
    .stat { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 0.9rem; text-align: center; }
    .stat-n { font-size: 1.6rem; font-weight: 300; color: var(--gold); }
    .stat-l { font-size: 0.62rem; color: var(--dim); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 0.2rem; }

    /* User picker */
    #picker { position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 900; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; }
    #picker.hidden { display: none; }
    .name-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; width: 100%; max-width: 320px; }
    .nbtn { background: var(--bg3); border: 1.5px solid var(--border); color: var(--text); padding: 0.85rem 0.5rem; border-radius: 14px; font-family: 'Inter', sans-serif; font-size: 0.88rem; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 0.3rem; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
    .nbtn:active { background: rgba(184,146,74,0.2); border-color: var(--gold); }
    .n-av { font-size: 1.5rem; line-height: 1; }
    .n-nm { font-size: 0.82rem; font-weight: 600; }

    /* Toast */
    #toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: var(--bg3); border: 1px solid var(--border); border-radius: 12px; padding: 0.55rem 1.1rem; font-size: 0.78rem; opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 9999; white-space: nowrap; }
  </style>
</head>
<body>

<div id="app">

  <!-- Header -->
  <div class="hdr">
    <div>
      <div class="hdr-brand">Am Fels</div>
      <div class="hdr-sub" id="hdrSub">Übersicht</div>
    </div>
    <div class="hdr-r">
      <span class="hdr-time" id="hdrTime"></span>
      <div class="uchip" id="userChip">
        <div class="udot"></div>
        <span id="uLabel">––</span>
      </div>
    </div>
  </div>

  <!-- Normal content (all tabs except chat) -->
  <div class="content" id="mainContent">

    <!-- DASHBOARD -->
    <div class="screen on" id="s-dash">
      <div class="dash-welcome">
        <div class="dw-emoji" id="dEmoji">👋</div>
        <div class="dw-name" id="dName">Hallo!</div>
        <div class="dw-date" id="dDate"></div>
      </div>
      <div class="stats">
        <div class="stat"><div class="stat-n" id="statOpen">–</div><div class="stat-l">Aufgaben offen</div></div>
        <div class="stat"><div class="stat-n" id="statOrders">–</div><div class="stat-l">Bestellungen</div></div>
      </div>
    </div>

    <!-- AUFGABEN -->
    <div class="screen" id="s-aufgaben">
      <div class="sh"><span class="st">Aufgaben</span><button class="add-btn" id="addTaskBtn">+</button></div>
      <div class="add-form" id="taskForm">
        <div class="fg"><label class="fl">Titel</label><input class="inp" id="taskTitle" placeholder="Was muss erledigt werden?"></div>
        <div class="fg"><label class="fl">Für</label>
          <select class="inp" id="taskAssign"></select>
        </div>
        <div class="row2">
          <button class="btn-gold" id="saveTask">Speichern</button>
          <button class="btn-dim" id="cancelTask">Abbrechen</button>
        </div>
      </div>
      <div class="chips" id="taskChips">
        <button class="chip on" data-filter="alle">Alle</button>
        <button class="chip" data-filter="offen">Offen</button>
        <button class="chip" data-filter="meine">Meine</button>
      </div>
      <div id="taskList"></div>
    </div>

    <!-- SCHICHT -->
    <div class="screen" id="s-schicht">
      <div class="sh">
        <span class="st">Schichtplan</span>
        <div style="display:flex;align-items:center;gap:0.4rem">
          <button class="btn-dim" id="shPrev" style="width:auto;padding:0.3rem 0.7rem;font-size:1rem">‹</button>
          <span id="shLabel" style="font-size:0.75rem;color:var(--dim);min-width:50px;text-align:center"></span>
          <button class="btn-dim" id="shNext" style="width:auto;padding:0.3rem 0.7rem;font-size:1rem">›</button>
        </div>
      </div>
      <div id="shiftGrid"></div>
    </div>

    <!-- BESTELLEN -->
    <div class="screen" id="s-bestellen">
      <div class="sh"><span class="st">Bestellliste</span><button class="add-btn" id="addOrderBtn">+</button></div>
      <div class="add-form" id="orderForm">
        <div class="fg"><label class="fl">Artikel</label><input class="inp" id="orderName" placeholder="z.B. Mehl"></div>
        <div class="fg"><label class="fl">Menge</label><input class="inp" id="orderQty" placeholder="z.B. 5 kg"></div>
        <div class="row2">
          <button class="btn-gold" id="saveOrder">Hinzufügen</button>
          <button class="btn-dim" id="cancelOrder">Abbrechen</button>
        </div>
      </div>
      <div id="orderList"></div>
    </div>

    <!-- WIKI -->
    <div class="screen" id="s-wiki">
      <div class="sh"><span class="st">Wiki</span></div>
      <p style="color:var(--dim);font-size:0.85rem;text-align:center;padding:3rem 1rem">🍳 Kommt bald</p>
    </div>

  </div>

  <!-- Chat (outside .content for own scroll) -->
  <div id="chatWrap">
    <div id="chatMsgs"></div>
    <div class="chat-row">
      <input class="inp" id="chatInp" placeholder="Nachricht…" style="flex:1">
      <button class="btn-gold" id="chatSend" style="width:auto;padding:0.75rem 1.1rem">→</button>
    </div>
  </div>

  <!-- Bottom Nav -->
  <div class="bnav">
    <button class="ni on" id="nav-dash"><span class="ni-icon">🏠</span>Start</button>
    <button class="ni" id="nav-aufgaben"><span class="ni-icon">✅</span>Aufgaben</button>
    <button class="ni" id="nav-chat"><span class="ni-icon">💬</span>Chat</button>
    <button class="ni" id="nav-schicht"><span class="ni-icon">📅</span>Schicht</button>
    <button class="ni" id="nav-bestellen"><span class="ni-icon">🛒</span>Bestellen</button>
  </div>
</div>

<!-- User picker -->
<div id="picker" class="hidden">
  <p style="font-size:0.55rem;letter-spacing:0.35em;color:var(--gold);text-transform:uppercase;margin-bottom:0.3rem">Restaurant</p>
  <h2 style="font-size:1.5rem;font-weight:200;margin-bottom:1.2rem">Wer bist du?</h2>
  <div class="name-grid" id="nameGrid"></div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
var DB   = 'https://apfels-team-default-rtdb.europe-west1.firebasedatabase.app/amfels';
var TEAM = ['Leon','Sasho','Patrik','Tea','Daniel'];
var EMOJ = ['👑','👨‍🍳','🍺','👩‍🍳','🍳'];

var me     = localStorage.getItem('af_user') || '';
var tasks  = [];
var orders = [];
var chat   = [];
var shiftOff = 0;
var shiftDb  = {};
var taskFilter = 'alle';
var chatPollT  = null;
var clockT     = null;

/* ── HELPERS ── */
function el(id) { return document.getElementById(id); }

function get(path, cb) {
  fetch(DB + path + '.json', {cache:'no-store'})
    .then(function(r) { return r.json(); })
    .then(function(d) { cb(null, d); })
    .catch(function(e) { cb(e, null); });
}

function put(path, data, cb) {
  fetch(DB + path + '.json', {method:'PUT', body:JSON.stringify(data), headers:{'Content-Type':'application/json'}})
    .then(function() { if (cb) cb(null); })
    .catch(function(e) { if (cb) cb(e); });
}

function post(path, data, cb) {
  fetch(DB + path + '.json', {method:'POST', body:JSON.stringify(data), headers:{'Content-Type':'application/json'}})
    .then(function(r) { return r.json(); })
    .then(function(d) { if (cb) cb(null, d && d.name); })
    .catch(function(e) { if (cb) cb(e, null); });
}

function del(path, cb) {
  fetch(DB + path + '.json', {method:'DELETE'})
    .then(function() { if (cb) cb(); })
    .catch(function() { if (cb) cb(); });
}

function toast(msg) {
  var t = el('toast');
  t.textContent = msg;
  t.style.opacity = '1';
  setTimeout(function() { t.style.opacity = '0'; }, 2400);
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function fmtTime(ts) {
  var d = new Date(ts);
  return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}

/* ── USER PICKER ── */
function buildPicker() {
  var grid = el('nameGrid');
  grid.innerHTML = '';
  TEAM.forEach(function(name, i) {
    var btn = document.createElement('button');
    btn.className = 'nbtn';
    btn.innerHTML = '<span class="n-av">' + EMOJ[i] + '</span><span class="n-nm">' + esc(name) + '</span>';
    btn.addEventListener('click', function() { pickUser(name); });
    grid.appendChild(btn);
  });
}

function pickUser(name) {
  me = name;
  localStorage.setItem('af_user', name);
  el('picker').classList.add('hidden');
  el('uLabel').textContent = name;
  updateDash();
  loadTasks();
  loadOrders();
  loadChat();
  toast('Hallo, ' + name + '!');
}

function showPicker() {
  el('picker').classList.remove('hidden');
}

/* ── CLOCK ── */
function tick() {
  var n = new Date();
  el('hdrTime').textContent = String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0');
}

/* ── NAV ── */
var TABS = ['dash','aufgaben','chat','schicht','bestellen','wiki'];

function switchTab(tab) {
  var isChat = tab === 'chat';
  el('mainContent').style.display = isChat ? 'none' : '';
  el('chatWrap').classList.toggle('on', isChat);

  TABS.forEach(function(t) {
    var s = el('s-' + t);
    var n = el('nav-' + t);
    if (s) s.classList.toggle('on', t === tab);
    if (n) n.classList.toggle('on', t === tab);
  });

  var labels = {dash:'Übersicht', aufgaben:'Aufgaben', chat:'Chat', schicht:'Schichtplan', bestellen:'Bestellliste', wiki:'Wiki'};
  el('hdrSub').textContent = labels[tab] || '';

  if (isChat) { el('chatMsgs').scrollTop = el('chatMsgs').scrollHeight; }
  if (tab === 'dash') { updateDash(); }
}

/* ── DASHBOARD ── */
function updateDash() {
  var h = new Date().getHours();
  var gr = h < 11 ? 'Guten Morgen' : h < 17 ? 'Hallo' : 'Guten Abend';
  var em = h < 11 ? '🌅' : h < 17 ? '☀️' : '🌙';
  el('dEmoji').textContent = em;
  el('dName').textContent  = gr + (me ? ', ' + me + '!' : '!');
  el('dDate').textContent  = new Date().toLocaleDateString('de-DE', {weekday:'long', day:'numeric', month:'long'});
  el('statOpen').textContent   = tasks.filter(function(t) { return !t.done; }).length;
  el('statOrders').textContent = orders.length;
}

/* ── TASKS ── */
function loadTasks() {
  get('/tasks', function(err, data) {
    tasks = [];
    if (data && !err) {
      Object.keys(data).forEach(function(k) {
        var t = data[k];
        t.id = k;
        tasks.push(t);
      });
      tasks.sort(function(a, b) { return (b.ts || 0) - (a.ts || 0); });
    }
    renderTasks();
    updateDash();
  });
}

function renderTasks() {
  var list = el('taskList');
  var shown = tasks.filter(function(t) {
    if (taskFilter === 'offen') return !t.done;
    if (taskFilter === 'meine') return t.assign === me;
    return true;
  });
  if (!shown.length) {
    list.innerHTML = '<p style="color:var(--dim);font-size:0.85rem;text-align:center;padding:2rem">Keine Aufgaben</p>';
    return;
  }
  list.innerHTML = '';
  shown.forEach(function(t) {
    var div = document.createElement('div');
    div.className = 'task' + (t.done ? ' done' : '');
    div.innerHTML =
      '<div class="t-check">' + (t.done ? '✓' : '') + '</div>' +
      '<div style="flex:1"><div class="t-title">' + esc(t.title) + '</div>' +
        '<div class="t-meta">' + esc(t.assign || 'Alle') + '</div></div>' +
      '<button class="del">✕</button>';
    div.querySelector('.t-check').addEventListener('click', function() { toggleTask(t.id); });
    div.querySelector('.t-title').addEventListener('click', function() { toggleTask(t.id); });
    div.querySelector('.del').addEventListener('click', function(e) { e.stopPropagation(); deleteTask(t.id); });
    list.appendChild(div);
  });
}

function toggleTask(id) {
  var t = null;
  tasks.forEach(function(x) { if (x.id === id) t = x; });
  if (!t) return;
  t.done = !t.done;
  put('/tasks/' + id, t);
  renderTasks();
  updateDash();
}

function deleteTask(id) {
  tasks = tasks.filter(function(t) { return t.id !== id; });
  del('/tasks/' + id);
  renderTasks();
  updateDash();
  toast('Gelöscht');
}

function saveTask() {
  var title = el('taskTitle').value.trim();
  if (!title) { toast('Bitte Titel eingeben'); return; }
  var assign = el('taskAssign').value;
  var task = {title: title, assign: assign, done: false, by: me, ts: Date.now()};
  post('/tasks', task, function(err, key) {
    if (key) { task.id = key; tasks.unshift(task); }
    el('taskTitle').value = '';
    el('taskForm').classList.remove('open');
    renderTasks();
    updateDash();
    toast('✓ Aufgabe gespeichert');
  });
}

/* ── ORDERS ── */
function loadOrders() {
  get('/orders', function(err, data) {
    orders = [];
    if (data && !err) {
      Object.keys(data).forEach(function(k) {
        var o = data[k];
        o.id = k;
        orders.push(o);
      });
      orders.sort(function(a, b) { return (b.ts || 0) - (a.ts || 0); });
    }
    renderOrders();
    updateDash();
  });
}

function renderOrders() {
  var list = el('orderList');
  if (!orders.length) {
    list.innerHTML = '<p style="color:var(--dim);font-size:0.85rem;text-align:center;padding:2rem">Liste ist leer</p>';
    return;
  }
  list.innerHTML = '';
  orders.forEach(function(o) {
    var div = document.createElement('div');
    div.className = 'order';
    div.innerHTML =
      '<div><div class="o-name">' + esc(o.name) + '</div><div class="o-qty">' + esc(o.qty || '') + '</div></div>' +
      '<button class="del">✕</button>';
    div.querySelector('.del').addEventListener('click', function() { deleteOrder(o.id); });
    list.appendChild(div);
  });
}

function saveOrder() {
  var name = el('orderName').value.trim();
  if (!name) { toast('Bitte Artikel eingeben'); return; }
  var qty = el('orderQty').value.trim();
  var order = {name: name, qty: qty, by: me, ts: Date.now()};
  post('/orders', order, function(err, key) {
    if (key) { order.id = key; orders.unshift(order); }
    el('orderName').value = '';
    el('orderQty').value = '';
    el('orderForm').classList.remove('open');
    renderOrders();
    updateDash();
    toast('✓ Hinzugefügt');
  });
}

function deleteOrder(id) {
  orders = orders.filter(function(o) { return o.id !== id; });
  del('/orders/' + id);
  renderOrders();
  updateDash();
}

/* ── CHAT ── */
function loadChat() {
  get('/chat', function(err, data) {
    chat = [];
    if (data && !err) {
      Object.keys(data).forEach(function(k) {
        var m = data[k];
        m.id = k;
        chat.push(m);
      });
      chat.sort(function(a, b) { return (a.ts || 0) - (b.ts || 0); });
    }
    renderChat();
  });
}

function renderChat() {
  var wrap = el('chatMsgs');
  if (!chat.length) {
    wrap.innerHTML = '<p style="color:var(--dim);font-size:0.85rem;text-align:center;padding:3rem">Noch keine Nachrichten</p>';
    return;
  }
  wrap.innerHTML = '';
  chat.forEach(function(m) {
    var mine = m.user === me;
    var div = document.createElement('div');
    div.className = 'bubble-wrap ' + (mine ? 'mine' : 'other');
    div.innerHTML =
      (!mine ? '<div class="bubble-who">' + esc(m.user || '?') + '</div>' : '') +
      '<div class="bubble">' + esc(m.text || '') + '</div>' +
      '<div class="bubble-time">' + fmtTime(m.ts || 0) + '</div>';
    wrap.appendChild(div);
  });
  wrap.scrollTop = wrap.scrollHeight;
}

function sendChat() {
  var inp = el('chatInp');
  var text = inp.value.trim();
  if (!text) return;
  if (!me) { toast('Bitte zuerst Namen wählen'); showPicker(); return; }
  inp.value = '';
  var msg = {user: me, text: text, ts: Date.now()};
  post('/chat', msg, function(err, key) {
    if (key) { msg.id = key; chat.push(msg); }
    renderChat();
  });
}

/* ── SHIFTS ── */
var DAYS_DE = ['Mo','Di','Mi','Do','Fr','Sa','So'];
var SCHICHTEN = [
  {k:'frueh',  l:'Früh',   t:'8–14'},
  {k:'mittag', l:'Mittag', t:'12–17'},
  {k:'abend',  l:'Abend',  t:'17–23'}
];

function isoWeek(d) {
  var date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  var day = date.getUTCDay() || 7;
  date.setUTCDate(date.getUTCDate() + 4 - day);
  var y1 = new Date(Date.UTC(date.getUTCFullYear(), 0, 4));
  return 1 + Math.round(((date - y1) / 86400000 - 3 + ((new Date(Date.UTC(y1.getUTCFullYear(),0,4)).getUTCDay()) || 7)) / 7);
}

function weekKey(off) {
  var now = new Date();
  var day = now.getDay() || 7;
  var mon = new Date(now);
  mon.setDate(now.getDate() - day + 1 + off * 7);
  return mon.getFullYear() + '-W' + String(isoWeek(mon)).padStart(2,'0');
}

function loadShift() {
  var key = weekKey(shiftOff);
  el('shLabel').textContent = 'KW ' + key.split('-W')[1];
  get('/schicht/' + key, function(err, data) {
    shiftDb = data || {};
    renderShift();
  });
}

function renderShift() {
  var html = '';
  DAYS_DE.forEach(function(day) {
    var dd = shiftDb[day] || {};
    var rows = '';
    SCHICHTEN.forEach(function(s) {
      var members = dd[s.k];
      if (!members || !members.length) return;
      rows += '<div class="sd-row"><span>' + s.l + ' <span class="sd-badge">' + s.t + '</span></span>' +
        '<span style="color:var(--dim);font-size:0.8rem">' + members.map(esc).join(', ') + '</span></div>';
    });
    if (!rows) return;
    html += '<div class="shift-day"><div class="sd-name">' + day + '</div>' + rows + '</div>';
  });
  if (!html) html = '<p style="color:var(--dim);font-size:0.85rem;text-align:center;padding:2rem">Keine Einträge</p>';
  el('shiftGrid').innerHTML = html;
}

/* ── BIND ALL EVENTS ── */
function bind() {

  /* Nav buttons */
  ['dash','aufgaben','chat','schicht','bestellen'].forEach(function(tab) {
    var btn = el('nav-' + tab);
    if (btn) btn.addEventListener('click', function() { switchTab(tab); });
  });

  /* User chip */
  el('userChip').addEventListener('click', showPicker);

  /* Tasks */
  el('addTaskBtn').addEventListener('click', function() {
    el('taskForm').classList.toggle('open');
  });
  el('saveTask').addEventListener('click', saveTask);
  el('cancelTask').addEventListener('click', function() { el('taskForm').classList.remove('open'); });
  el('taskTitle').addEventListener('keydown', function(e) { if (e.key === 'Enter') saveTask(); });

  /* Task filter chips */
  el('taskChips').addEventListener('click', function(e) {
    var btn = e.target.closest('.chip');
    if (!btn) return;
    el('taskChips').querySelectorAll('.chip').forEach(function(c) { c.classList.remove('on'); });
    btn.classList.add('on');
    taskFilter = btn.dataset.filter;
    renderTasks();
  });

  /* Orders */
  el('addOrderBtn').addEventListener('click', function() {
    el('orderForm').classList.toggle('open');
  });
  el('saveOrder').addEventListener('click', saveOrder);
  el('cancelOrder').addEventListener('click', function() { el('orderForm').classList.remove('open'); });
  el('orderName').addEventListener('keydown', function(e) { if (e.key === 'Enter') saveOrder(); });

  /* Chat */
  el('chatSend').addEventListener('click', sendChat);
  el('chatInp').addEventListener('keydown', function(e) { if (e.key === 'Enter') sendChat(); });

  /* Shifts */
  el('shPrev').addEventListener('click', function() { shiftOff--; loadShift(); });
  el('shNext').addEventListener('click', function() { shiftOff++; loadShift(); });

  /* Task assign dropdown */
  var sel = el('taskAssign');
  sel.innerHTML = '<option value="Alle">Alle</option>' +
    TEAM.map(function(n) { return '<option value="' + esc(n) + '"' + (n === me ? ' selected' : '') + '>' + esc(n) + '</option>'; }).join('');
}

/* ── INIT ── */
buildPicker();
bind();
tick();
clockT = setInterval(tick, 30000);

if (me) {
  el('uLabel').textContent = me;
} else {
  showPicker();
}

updateDash();
loadTasks();
loadOrders();
loadChat();
loadShift();

chatPollT = setInterval(function() {
  if (el('chatWrap').classList.contains('on')) loadChat();
}, 6000);
</script>
