];
function showReinigung() {
  var today = todayKey();
  var wk = weekKey(0);
  var body = makeOv('Reinigung – ' + today);
  var loaded = 0;
  var dailyData = {};
  var weeklyData = {};
  function onLoaded() {
    loaded++;
    if (loaded < 2) return;
    renderSection('täglich',     dailyData,  '/reinigung/d/' + today + '/');
    renderSection('wöchentlich', weeklyData, '/reinigung/w/' + wk + '/');
  }
  dbGet('/reinigung/d/' + today, function(err, data) { dailyData  = data || {}; onLoaded(); });
  dbGet('/reinigung/w/' + wk,    function(err, data) { weeklyData = data || {}; onLoaded(); });
  function renderSection(freq, data, basePath) {
    var section = REINIG.filter(function(r) { return r.freq === freq; });
    var hdr = document.createElement('p');
    hdr.style.cssText = 'font-size:0.65rem;font-weight:600;color:var(--gold);text-transform:uppercase;letter-spacing:0.08em;margin:0.75rem 0 0.4rem';
    hdr.textContent = freq;
    body.appendChild(hdr);
    section.forEach(function(item) {
      var entry = data[item.id] || {};
      var checked = !!entry.checked;
      var div = document.createElement('div');
      div.className = 'cl-item' + (checked ? ' checked' : '');
      div.innerHTML =
        '<div class="cl-box">' + (checked ? '✓' : '') + '</div>' +
        '<div class="cl-text"><div class="cl-label">' + esc(item.label) + '</div>' +
          (checked && entry.by ? '<div class="cl-who">✓ ' + esc(entry.by) + ' ' + fmtTime(entry.ts||0) + '</div>' : '') +
        '</div>';
      div.addEventListener('click', function() {
        var isNow = !entry.checked;
        entry.checked = isNow; entry.by = me; entry.ts = Date.now();
        data[item.id] = entry;
        dbPut(basePath + item.id, entry);
        div.className = 'cl-item' + (isNow ? ' checked' : '');
        div.querySelector('.cl-box').textContent = isNow ? '✓' : '';
        div.querySelector('.cl-label').style.textDecoration = isNow ? 'line-through' : '';
        var whoEl = div.querySelector('.cl-who');
        if (isNow) {
          if (!whoEl) { whoEl = document.createElement('div'); whoEl.className = 'cl-who'; div.querySelector('.cl-text').appendChild(whoEl); }
          whoEl.textContent = '✓ ' + me + ' ' + fmtTime(Date.now());
        } else { if (whoEl) whoEl.remove(); }
      });
      body.appendChild(div);
    });
  }
}

/* ── TRINKGELD ── */
function showTrinkgeld() {
  var body = makeOv('Trinkgeld');
  function render() {
    body.innerHTML =
      '<div class="add-form open" style="margin-bottom:1rem">' +
        '<div class="fg"><label class="fl">Datum</label><input class="inp" type="date" id="tgDate" value="' + todayKey() + '"></div>' +
        '<div class="fg"><label class="fl">Betrag (€)</label><input class="inp" type="number" id="tgAmount" placeholder="z.B. 42.50" step="0.01"></div>' +
        '<div class="fg"><label class="fl">Notiz (optional)</label><input class="inp" id="tgNote" placeholder="z.B. Abend war voll"></div>' +
        '<button class="btn-g" style="width:100%" id="tgSave">Eintragen</button>' +
      '</div>' +
      '<div id="tgList"></div>';
    body.querySelector('#tgSave').addEventListener('click', function() {
      var date = body.querySelector('#tgDate').value;
      var amount = parseFloat(body.querySelector('#tgAmount').value);
      if (!date || isNaN(amount)) { toast('Bitte Datum und Betrag eingeben'); return; }
      var note = body.querySelector('#tgNote').value.trim();
      dbPost('/trinkgeld', {date:date, amount:amount, note:note, by:me, ts:Date.now()}, function(err, key) {
        body.querySelector('#tgAmount').value = '';
        body.querySelector('#tgNote').value = '';
        loadTgList();
        toast('✓ Eingetragen');
      });
    });
    loadTgList();
  }
  function loadTgList() {
    dbGet('/trinkgeld', function(err, data) {
      var list = body.querySelector('#tgList');
      if (!list) return;
      list.innerHTML = '';
      if (!data || err) { list.innerHTML = '<p class="empty">Keine Einträge</p>'; return; }
      var entries = Object.keys(data).map(function(k) { var e = data[k]; e.id = k; return e; });
      entries.sort(function(a,b) { return (b.date||'') > (a.date||'') ? 1 : -1; });
      var total = entries.reduce(function(s,e) { return s + (e.amount||0); }, 0);
      var sum = document.createElement('div');
      sum.style.cssText = 'background:rgba(184,146,74,0.1);border:1px solid var(--gold);border-radius:12px;padding:0.75rem 1rem;margin-bottom:0.5rem;text-align:center';
      sum.innerHTML = '<div style="font-size:0.65rem;color:var(--dim);margin-bottom:0.2rem">Gesamt</div><div style="font-size:1.4rem;font-weight:300;color:var(--gold)">' + total.toFixed(2) + ' €</div>';
      list.appendChild(sum);
      /* Split calculator */
      var splitPersons = TEAM.length;
      var splitDiv = document.createElement('div');
      splitDiv.style.cssText = 'background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:0.65rem 1rem;margin-bottom:0.75rem';
      function renderSplit() {
        splitDiv.innerHTML =
          '<div style="font-size:0.6rem;color:var(--dim);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:0.4rem">Aufteilen</div>' +
          '<div style="display:flex;align-items:center;gap:0.5rem">' +
            '<button class="qty-btn" id="spMinus">−</button>' +
            '<span style="min-width:18px;text-align:center;font-size:0.88rem">' + splitPersons + '</span>' +
            '<button class="qty-btn" id="spPlus">+</button>' +
            '<span style="font-size:0.72rem;color:var(--dim)">Personen</span>' +
            '<span style="margin-left:auto;font-size:1rem;font-weight:600;color:var(--gold)">' + (splitPersons > 0 ? (total/splitPersons).toFixed(2) : '–') + ' €</span>' +
          '</div>';
        splitDiv.querySelector('#spMinus').addEventListener('click', function() { if (splitPersons > 1) { splitPersons--; renderSplit(); } });
        splitDiv.querySelector('#spPlus').addEventListener('click', function() { splitPersons++; renderSplit(); });
      }
      renderSplit();
      list.appendChild(splitDiv);
      /* Monthly summary */
      var months = {};
      entries.forEach(function(e) {
        if (!e.date) return;
        var mo = e.date.substring(0, 7);
        months[mo] = (months[mo] || 0) + (e.amount || 0);
      });
      var moKeys = Object.keys(months).sort().reverse();
      if (moKeys.length > 1) {
        var mNames2 = ['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];
        var moHdr = document.createElement('p');
        moHdr.style.cssText = 'font-size:0.65rem;font-weight:600;color:var(--gold);text-transform:uppercase;letter-spacing:0.05em;margin:0.75rem 0 0.4rem';
        moHdr.textContent = 'Monatsübersicht'; list.appendChild(moHdr);
        moKeys.slice(0, 6).forEach(function(mo) {
          var parts = mo.split('-');
          var div = document.createElement('div'); div.className = 'tg-entry';
          div.innerHTML = '<div class="tg-date">' + mNames2[parseInt(parts[1])-1] + ' ' + parts[0] + '</div><div class="tg-amount">' + months[mo].toFixed(2) + ' €</div>';
          list.appendChild(div);
        });
        var moSep = document.createElement('p');
        moSep.style.cssText = 'font-size:0.65rem;font-weight:600;color:var(--gold);text-transform:uppercase;letter-spacing:0.05em;margin:0.75rem 0 0.4rem';
        moSep.textContent = 'Alle Einträge'; list.appendChild(moSep);
      }
      entries.slice(0,20).forEach(function(e) {
        var div = document.createElement('div');
        div.className = 'tg-entry';
        div.innerHTML = '<div><div class="tg-date">' + esc(e.date||'?') + (e.note ? ' · ' + esc(e.note) : '') + '</div>' +
          '<div style="font-size:0.65rem;color:var(--dim)">' + esc(e.by||'?') + '</div></div>' +
          '<div style="display:flex;align-items:center;gap:0.5rem"><span class="tg-amount">' + (e.amount||0).toFixed(2) + ' €</span>' +
          '<button class="del" data-id="' + esc(e.id) + '">✕</button></div>';
        div.querySelector('.del').addEventListener('click', function() {
          confirmDel('Trinkgeld-Eintrag löschen?', function() { dbDel('/trinkgeld/' + e.id, loadTgList); });
        });
        list.appendChild(div);
      });
    });
  }
  render();
}

/* ── INVENTAR ── */
function showInventar() {
  var body = makeOv('Inventar');
  body.innerHTML =
    '<div class="add-form open" style="margin-bottom:1rem">' +
      '<div class="fg"><label class="fl">Artikel</label><input class="inp" id="invName" placeholder="z.B. Mehl"></div>' +
      '<div class="row2">' +
        '<div class="fg" style="flex:1"><label class="fl">Menge</label><input class="inp" type="number" id="invQty" placeholder="0" min="0"></div>' +
        '<div class="fg" style="flex:1"><label class="fl">Einheit</label><input class="inp" id="invUnit" placeholder="kg / St."></div>' +
        '<div class="fg" style="flex:1"><label class="fl">Mindest</label><input class="inp" type="number" id="invMin" placeholder="0" min="0" title="Mindestbestand – Warnung wenn Bestand zu niedrig"></div>' +
      '</div>' +
      '<button class="btn-g" style="width:100%" id="invSave">Hinzufügen</button>' +
    '</div>' +
    '<div id="invList"></div>';
  function loadInv() {
    dbGet('/inventar', function(err, data) {
      var list = body.querySelector('#invList');
      list.innerHTML = '';
      if (!data || err) { list.innerHTML = '<p class="empty">Keine Einträge</p>'; return; }
      var invItems = Object.keys(data).map(function(k) { var item = data[k]; item.id = k; return item; });
      invItems.sort(function(a,b) { return (a.name||'').localeCompare(b.name||'','de'); });
      invItems.forEach(function(item) {
        var k = item.id;
        var isLow = typeof item.min === 'number' && item.min > 0 && (item.qty||0) <= item.min;
        var div = document.createElement('div');
        div.className = 'inv-item';
        div.style.borderLeft = isLow ? '3px solid var(--red)' : '';
        var qtyColor = isLow ? 'var(--red)' : 'var(--gold)';
        var lowTag = isLow ? ' <span style="font-size:0.6rem;color:var(--red);background:rgba(224,82,82,0.12);border-radius:4px;padding:0.05rem 0.3rem">Niedrig</span>' : '';
        div.innerHTML =
          '<div class="inv-name">' + esc(item.name||'?') + lowTag + '<div class="inv-unit">' + esc(item.unit||'') + (item.min ? ' · Min: ' + item.min : '') + '</div></div>' +
          '<button class="qty-btn" data-op="-">−</button>' +
          '<div class="inv-qty" style="color:' + qtyColor + '">' + esc(item.qty||0) + '</div>' +
          '<button class="qty-btn" data-op="+">+</button>' +
          (isLow ? '<button class="qty-btn inv-reorder" title="Zur Bestellliste" style="color:var(--red);font-size:0.75rem">🛒</button>' : '') +
          '<button class="del">✕</button>';
        div.querySelectorAll('.qty-btn').forEach(function(btn) {
          btn.addEventListener('click', function() {
            var op = btn.dataset.op;
            item.qty = (parseInt(item.qty)||0) + (op === '+' ? 1 : -1);
            if (item.qty < 0) item.qty = 0;
            dbPut('/inventar/' + k, item, function() { loadInv(); });
          });
        });
        var reorderBtn = div.querySelector('.inv-reorder');
        if (reorderBtn) {
          reorderBtn.addEventListener('click', function() {
            dbPost('/orders', {name:item.name, qty:'nachbestellen', by:me, ts:Date.now()}, function() {
              toast('✓ ' + item.name + ' → Bestellliste'); loadOrders();
            });
          });
        }
        div.querySelector('.del').addEventListener('click', function() { confirmDel('Inventar-Eintrag löschen?', function() { dbDel('/inventar/' + k, loadInv); }); });
        list.appendChild(div);
      });
    });
  }
  body.querySelector('#invSave').addEventListener('click', function() {
    var name = body.querySelector('#invName').value.trim();
    if (!name) { toast('Bitte Artikel eingeben'); return; }
    var qty  = parseInt(body.querySelector('#invQty').value) || 0;
    var unit = body.querySelector('#invUnit').value.trim();
    var min  = parseInt(body.querySelector('#invMin').value) || 0;
    dbPost('/inventar', {name:name, qty:qty, unit:unit, min:min, by:me, ts:Date.now()}, function(err, key) {
      body.querySelector('#invName').value = '';
      body.querySelector('#invQty').value = '';
      body.querySelector('#invUnit').value = '';
      body.querySelector('#invMin').value = '';
      loadInv(); toast('✓ Hinzugefügt');
    });
  });
  loadInv();
}

/* ── MÜLLKALENDER (WIZARD) ── */
function showMuellkalender() {
  var body = makeOv('Müllkalender');
  var REPEAT_LABELS = {none:'Einmalig',weekly:'Wöchentlich',biweekly:'Alle 2 Wochen',fourweekly:'Alle 4 Wochen',monthly:'Monatlich'};
  var VALID_TYPES   = MULL_TYPES.map(function(t){return t.key;});
  var REPSHORT      = {none:'',weekly:'· wöchentlich',biweekly:'· alle 2 Wo.',fourweekly:'· alle 4 Wo.',monthly:'· monatlich'};
  var MONTH_DE      = ['','Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];

  /* ─ ICS helpers ─ */
  function unfoldICS(t){return t.replace(/\r\n[ \t]/g,'').replace(/\n[ \t]/g,'');}
  function mapICSType(s){
    s=(s||'').toLowerCase().replace(/ü/g,'u').replace(/ä/g,'a').replace(/ö/g,'o').replace(/ß/g,'ss');
    if(/restm|hausm|grau|schwarze|rest.?abf|rest.?mull|hausabf|gemischte/.test(s))return'Restmüll';
    if(/biom|bio.?abf|braune|kompost|speise|grun.?abf/.test(s))return'Biomüll';
    if(/gelb|plastik|leicht|dsd|grune.?tonne|wert.?stoff|verpack/.test(s))return'Gelber Sack';
    if(/papier|pappe|karton|alte.?papier|blau|zeitun/.test(s))return'Papier';
    if(/glas|altglas/.test(s))return'Glas';
    return null;
  }
  function groupRepeat(evts){
    var byType={};
    evts.forEach(function(e){if(!byType[e.type])byType[e.type]=[];byType[e.type].push(e.date);});
    var result=[];
    Object.keys(byType).forEach(function(type){
      var dates=byType[type].filter(function(d,i,a){return a.indexOf(d)===i;}).sort();
      if(dates.length<3){dates.forEach(function(d){result.push({type:type,date:d,repeat:'none'});});return;}
      var diffs=[];
      for(var i=1;i<dates.length;i++)diffs.push(Math.round((new Date(dates[i])-new Date(dates[i-1]))/86400000));
      var avg=diffs.reduce(function(a,b){return a+b;},0)/diffs.length;
      var ok=diffs.every(function(d){return Math.abs(d-avg)<=4;});
      var rep='none';
      if(ok){if(avg>=5&&avg<=9)rep='weekly';else if(avg>=11&&avg<=17)rep='biweekly';else if(avg>=25&&avg<=35)rep='fourweekly';}
      if(rep!=='none')result.push({type:type,date:dates[0],repeat:rep,repeatEnd:dates[dates.length-1]});
      else dates.forEach(function(d){result.push({type:type,date:d,repeat:'none'});});
    });
    result.sort(function(a,b){return a.date<b.date?-1:1;});
    return result;
  }
  function parseICS(text,sel){
    text=unfoldICS(text);var raw=[];
    text.split(/BEGIN:VEVENT/i).slice(1).forEach(function(block){
      var dtm=block.match(/DTSTART[^:]*:(\d{8})/i);if(!dtm)return;
      var date=dtm[1].slice(0,4)+'-'+dtm[1].slice(4,6)+'-'+dtm[1].slice(6,8);
      var sum=block.match(/SUMMARY[^:]*:([^\r\n]+)/i);
      var desc=block.match(/DESCRIPTION[^:]*:([^\r\n]+)/i);
      var type=mapICSType(((sum?sum[1]:'')+(desc?' '+desc[1]:'')).trim());
      if(type&&sel.indexOf(type)>=0)raw.push({type:type,date:date});
    });
    return groupRepeat(raw);
  }

  /* ─ PDF helper ─ */
  function loadPDFJS(cb){
    if(window.pdfjsLib){cb();return;}
    var s=document.createElement('script');
    s.src='https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js';
    s.onload=function(){window.pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';cb();};
    s.onerror=function(){cb(new Error('load'));};
    document.head.appendChild(s);
  }
  function extractPDFText(source){
    return new Promise(function(resolve,reject){
      loadPDFJS(function(err){
        if(err)return reject(err);
        var docPromise=source instanceof ArrayBuffer
          ?window.pdfjsLib.getDocument({data:source}).promise
          :window.pdfjsLib.getDocument({data:source}).promise;
        docPromise.then(function(pdf){
          setStatus('📄 '+pdf.numPages+' Seiten werden gelesen…');
          var ps=[];
          for(var i=1;i<=pdf.numPages;i++){
            (function(n){ps.push(pdf.getPage(n).then(function(p){return p.getTextContent().then(function(c){return c.items.map(function(it){return it.str;}).join(' ');});}));})(i);
          }
          Promise.all(ps).then(function(pages){resolve(pages.join('\n'));}).catch(reject);
        }).catch(reject);
      });
    });
  }
  function fetchBinary(url){
    var proxies=['https://api.allorigins.win/raw?url='+encodeURIComponent(url),'https://corsproxy.io/?'+encodeURIComponent(url),'https://thingproxy.freeboard.io/fetch/'+url];
    function tryNext(i){
      if(i>=proxies.length)return Promise.reject(new Error('all failed'));
      return fetch(proxies[i]).then(function(r){return r.arrayBuffer();}).then(function(buf){
        var m=new Uint8Array(buf.slice(0,4));
        if(String.fromCharCode(m[0],m[1],m[2],m[3])!=='%PDF')throw new Error('not pdf');
        return buf;
      }).catch(function(){return tryNext(i+1);});
    }
    return tryNext(0);
  }
  function fetchText(url){
    return fetch('https://api.allorigins.win/raw?url='+encodeURIComponent(url))
      .then(function(r){if(!r.ok)throw new Error();return r.text();})
      .catch(function(){return fetch('https://corsproxy.io/?'+encodeURIComponent(url)).then(function(r){return r.text();});});
  }

  /* ─ LLM helpers ─ */
  function llmCall(msgs,onDone,onErr){
    fetch('https://text.pollinations.ai/',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({messages:msgs,model:'openai',private:true})})
    .then(function(r){return r.text();}).then(onDone).catch(function(){onErr('Verbindungsfehler.');});
  }
  function findStreetsLLM(calText,onDone){
    var prompt='Liste alle Straßennamen (und deren Tour-/Bezirksnummer falls vorhanden) aus folgendem deutschen Abfallkalender.\nAntworte NUR mit einem JSON-Array: [{"street":"Hauptstraße","tour":"3"},...]\nKeine Tour-Nummer → tour:""\nNUR das JSON-Array, keine Erklärung.\n\nKALENDERTEXT:\n'+calText.slice(0,18000);
    llmCall([{role:'system',content:'Du extrahierst Straßennamen aus Abfallkalendern. Antworte ausschließlich mit einem JSON-Array.'},{role:'user',content:prompt}],
      function(raw){var mm=raw.match(/\[[\s\S]*\]/);var streets=[];if(mm){try{streets=JSON.parse(mm[0]);}catch(e){}}onDone(streets);},
      function(){onDone([]);});
  }
  function extractDatesLLM(calText,streetLabel,sel,onDone,onErr){
    var yr=new Date().getFullYear();
    var prompt='Du bist ein Datenextraktor für deutsche Abfallkalender.\n\n'+(streetLabel?'MEINE STRASSE / TOUR: "'+streetLabel+'"\n':'')+'GESUCHTE MÜLLARTEN: '+sel.join(', ')+'\n\nSuche alle Abholdaten'+(streetLabel?' für die Straße "'+streetLabel+'"':'')+'. Daten oft als "5.1." → '+yr+'-01-05\n\nJSON AUSGABE (NUR Array):\n[{"type":"Restmüll","date":"'+yr+'-01-05"},...]\n\nREGELN:\n- Nur Typen: '+sel.join(' | ')+'\n- Datum YYYY-MM-DD, Jahr '+yr+'\n- Nichts → NUR: NICHT_GEFUNDEN\n\nKALENDERTEXT:\n'+calText.slice(0,22000);
    llmCall([{role:'system',content:'Du extrahierst Daten aus Abfallkalendern. Antworte ausschließlich mit einem JSON-Array oder NICHT_GEFUNDEN.'},{role:'user',content:prompt}],
      function(raw){
        raw=(raw||'').trim();
        if(raw.indexOf('NICHT_GEFUNDEN')>=0){onErr('Keine Termine für "'+(streetLabel||'diese Quelle')+'" gefunden.');return;}
        var mm=raw.match(/\[[\s\S]*\]/);if(!mm){onErr('Keine Termine erkannt.');return;}
        var parsed;try{parsed=JSON.parse(mm[0]);}catch(e){onErr('Fehler beim Verarbeiten.');return;}
        parsed=parsed.filter(function(e){return e.date&&e.type&&VALID_TYPES.indexOf(e.type)>=0;});
        onDone(groupRepeat(parsed.map(function(e){return{type:e.type,date:e.date};})));
      },onErr);
  }
  function extractVisionLLM(b64,mime,sel,onDone,onErr){
    var yr=new Date().getFullYear();
    var prompt='Extrahiere alle Müllabfuhr-Termine aus diesem Bild eines deutschen Abfallkalenders.\nAntworte NUR mit JSON-Array:\n[{"type":"Restmüll","date":"'+yr+'-01-05"},...]\nTypen: '+sel.join(' | ')+'\nDatum YYYY-MM-DD, Jahr '+yr+'\nNichts → NUR: NICHT_GEFUNDEN';
    llmCall([{role:'user',content:[{type:'text',text:prompt},{type:'image_url',image_url:{url:'data:'+mime+';base64,'+b64}}]}],
      function(raw){
        raw=(raw||'').trim();
        if(raw.indexOf('NICHT_GEFUNDEN')>=0){onErr('Keine Termine im Bild erkannt.');return;}
        var mm=raw.match(/\[[\s\S]*\]/);if(!mm){onErr('Keine Termine erkannt.');return;}
        var parsed;try{parsed=JSON.parse(mm[0]);}catch(e){onErr('Fehler beim Verarbeiten.');return;}
        parsed=parsed.filter(function(e){return e.date&&e.type&&VALID_TYPES.indexOf(e.type)>=0;});
        onDone(groupRepeat(parsed.map(function(e){return{type:e.type,date:e.date};})));
      },onErr);
  }

    /* Paste fallback toggle */

    var pasteWrap=document.createElement('div');pasteWrap.style.display='none';

  /* ─ STEP 3: PREVIEW ─ */
  function showPreview(parsed){
    if(!parsed||!parsed.length){showErr('Keine Termine erkannt.');return;}
    body.innerHTML='';
    body.appendChild(progress(3));
    var titleEl=document.createElement('div');titleEl.style.cssText='font-size:0.72rem;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:0.25rem';titleEl.textContent=parsed.length+' Termine erkannt';
    body.appendChild(titleEl);
    var sub=document.createElement('div');sub.style.cssText='font-size:0.72rem;color:var(--dim);margin-bottom:0.75rem';sub.textContent='Nicht benötigte abwählen, dann bestätigen.';body.appendChild(sub);

    var months={};
    parsed.forEach(function(e){var m=e.date?e.date.slice(0,7):'?';if(!months[m])months[m]=[];months[m].push(e);});
    var checks={};
    Object.keys(months).sort().forEach(function(m){
      var mp=m.split('-');var mLabel=mp.length>=2?(MONTH_DE[parseInt(mp[1])]||mp[1])+' '+mp[0]:m;

    confirmBtn.addEventListener('click',function(){
      var toSave=parsed.filter(function(e){return checks[e.date+'|'+e.type];});

      doImport(toSave);

  /* ─ IMPORT ─ */
  function doImport(toSave){
    setStatus('💾 '+toSave.length+' Termine werden eingetragen…');
    var done=0;
    toSave.forEach(function(e){
      var entry={type:e.type,date:e.date,repeat:e.repeat||'none',by:me,ts:Date.now()};
      if(e.repeatEnd)entry.repeatEnd=e.repeatEnd;
      dbPost('/muell',entry,function(err,key){
        if(key){mullData[key]=entry;mullData[key].id=key;}
        done++;if(done===toSave.length){loadDashExtras();toast('✓ '+toSave.length+' Termine eingetragen');showList();}

  function showList(){

      '<div class="fg" id="mullEndFg" style="display:none"><label class="fl">Wiederholung bis</label><input class="inp" type="date" id="mullEndDate"></div>'+
      '<button class="btn-g" style="width:100%" id="mullSave">+ Manuell hinzufügen</button>';
    body.appendChild(form);
    form.querySelector('#mullRepeat').addEventListener('change',function(){form.querySelector('#mullEndFg').style.display=this.value!=='none'?'':'none';});
    form.querySelector('#mullSave').addEventListener('click',function(){
      var type=form.querySelector('#mullType').value,date=form.querySelector('#mullDate').value,repeat=form.querySelector('#mullRepeat').value,rEnd=form.querySelector('#mullEndDate').value;
      if(!date){toast('Bitte Datum eingeben');return;}
      var entry={type:type,date:date,repeat:repeat,by:me,ts:Date.now()};if(repeat!=='none'&&rEnd)entry.repeatEnd=rEnd;
      dbPost('/muell',entry,function(err,key){if(key){mullData[key]=entry;mullData[key].id=key;}renderListItems();toast('✓ Eingetragen');loadDashExtras();});
    });
    renderListItems();
  }
  function renderListItems(){
    var old=body.querySelector('#mullList');if(old)old.parentNode.removeChild(old);
    var list=document.createElement('div');list.id='mullList';body.appendChild(list);
    dbGet('/muell',function(err,data){
      mullData=data||{};list.innerHTML='';
      if(!data||err||!Object.keys(data).length){list.innerHTML='<p class="empty">Keine Einträge</p>';return;}
      var entries=Object.keys(data).map(function(k){var e=data[k];e.id=k;return e;});
      entries.sort(function(a,b){return(a.date||'')<(b.date||'')?-1:1;});
      var now=new Date();now.setHours(0,0,0,0);
      var upcoming=entries.filter(function(e){return(e.repeat&&e.repeat!=='none')||(e.date&&keyToDate(e.date)>=now);});
      var past=entries.filter(function(e){return(!e.repeat||e.repeat==='none')&&e.date&&keyToDate(e.date)<now;});
      var hdr=document.createElement('p');hdr.style.cssText='font-size:0.65rem;font-weight:600;color:var(--gold);text-transform:uppercase;letter-spacing:0.05em;margin:0 0 0.5rem';hdr.textContent='Termine';list.appendChild(hdr);

        div.querySelector('.del').addEventListener('click',function(){confirmDel(esc(e.type)+'-Termin löschen?',function(){dbDel('/muell/'+e.id,function(){delete mullData[e.id];renderListItems();loadDashExtras();});});});
        list.appendChild(div);
      }
      upcoming.forEach(renderEntry);
      if(past.length){

        past.slice(0,5).forEach(renderEntry);
      }
    });
  }

  showSource();
}

/* ── KI ASSISTENT ── */
function showKI() {
  var body = makeOv('🤖 KI Assistent');
  var kiMessages = [];

  function addMsg(role, text, loaderId) {
    var chat = el('kiChat'); if (!chat) return null;
    var div = document.createElement('div');
    div.className = 'ki-msg ' + role + (loaderId ? ' loading' : '');
    if (loaderId) div.id = loaderId;
    div.textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  function sendMsg() {
    var inp = el('kiInp'); if (!inp) return;
    var text = inp.value.trim(); if (!text) return;
    inp.value = '';
    addMsg('user', text);
    kiMessages.push({role:'user', content:text});
    addMsg('ai', 'Schreibt…', 'kiLoader');

    var openTasks = tasks.filter(function(t) { return !t.done; }).map(function(t) { return t.title; }).slice(0,5).join(', ');
    var sysPrompt = 'Du bist ein interner Team-Assistent für eine Restaurantküche in Österreich. ' +
      'Antworte IMMER auf Deutsch. Sei kurz und direkt. ' +
      'Das Team heißt: Leon (Admin), Sasho, Patrik, Tea, Daniel. Eingeloggt: ' + (me || 'Unbekannt') + '. ' +
      (openTasks ? 'Offene Aufgaben: ' + openTasks + '. ' : '') +
      'Beantworte NUR was der Nutzer direkt fragt. ' +
      'Schlage KEINE Gerichte, Menüs oder Rezepte vor außer der Nutzer fragt explizit danach. ' +
      'Hilf mit: Aufgaben, Schichtplanung, Reinigungspläne, Inventar, Teamkommunikation, allgemeine Fragen.';

    var msgs = [{role:'system', content:sysPrompt}].concat(kiMessages);

    fetch('https://text.pollinations.ai/', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({messages: msgs, model:'openai', private:true})
    })
    .then(function(r) { return r.text(); })
    .then(function(reply) {
      var loader = el('kiLoader'); if (loader) loader.parentNode.removeChild(loader);
      reply = (reply || '').trim();
      if (!reply) reply = 'Keine Antwort erhalten.';
      kiMessages.push({role:'assistant', content:reply});
      addMsg('ai', reply);
    })
    .catch(function() {
      var loader = el('kiLoader'); if (loader) loader.parentNode.removeChild(loader);
      addMsg('ai', 'Verbindungsfehler. Bitte nochmal versuchen.');
    });
  }

  body.innerHTML = '';
  var chatEl = document.createElement('div'); chatEl.className = 'ki-chat'; chatEl.id = 'kiChat';
  body.appendChild(chatEl);
  addMsg('ai', 'Hallo! Ich bin der KI Assistent für Am Fels. Wie kann ich helfen? 👋');

  var inputRow = document.createElement('div'); inputRow.className = 'ki-input-row';
  var inp = document.createElement('input'); inp.className = 'inp'; inp.id = 'kiInp';
  inp.placeholder = 'Frag mich etwas…';
  var sendBtn = document.createElement('button'); sendBtn.className = 'btn-g'; sendBtn.textContent = '→';
  inputRow.appendChild(inp); inputRow.appendChild(sendBtn);
  body.appendChild(inputRow);

  sendBtn.addEventListener('click', sendMsg);
  inp.addEventListener('keydown', function(e) { if (e.key === 'Enter') sendMsg(); });
}

/* ── WIKI ── */
function showWiki() {
  var body = makeOv('Wiki');
  var tabState = 'rezepte';
  body.innerHTML =
    '<div class="chips" id="wikiChips">' +
      '<button class="chip on" data-wt="rezepte">Rezepte</button>' +
      '<button class="chip" data-wt="anleitungen">Anleitungen</button>' +
    '</div>' +
    '<div id="wikiAdd" class="add-form"><div class="fg"><label class="fl">Titel</label><input class="inp" id="wTitle" placeholder="Name"></div>' +
      '<div class="fg"><label class="fl">Inhalt</label><textarea class="inp" id="wBody" placeholder="Zutaten, Schritte, Hinweise…"></textarea></div>' +
      '<div class="row2"><button class="btn-g" id="wSave">Speichern</button><button class="btn-d" id="wCancel">Abbrechen</button></div></div>' +
    '<div style="display:flex;justify-content:flex-end;margin-bottom:0.5rem"><button class="btn-d" id="wAddBtn" style="padding:0.4rem 1rem;font-size:0.82rem">+ Neu</button></div>' +
    '<div id="wikiList"></div>';

  function loadWiki() {
    dbGet('/' + tabState, function(err, data) {
      var list = body.querySelector('#wikiList');
      list.innerHTML = '';
      if (!data || err) { list.innerHTML = '<p class="empty">Noch nichts vorhanden</p>'; return; }
      var wItems = Object.keys(data).map(function(k) { var item = data[k]; item.id = k; return item; });
      wItems.sort(function(a,b) { return (a.title||'').localeCompare(b.title||'','de'); });
      wItems.forEach(function(item) {
        var k = item.id;
        var div = document.createElement('div');
        div.className = 'wiki-item';
        div.innerHTML = '<div style="display:flex;justify-content:space-between;align-items:flex-start">' +
          '<div><div class="wiki-title">' + esc(item.title||'?') + '</div>' +
          '<div class="wiki-sub">' + esc((item.body||'').substring(0,60)) + (item.body && item.body.length>60?'…':'') + '</div></div>' +
          '<button class="del">✕</button></div>';
        div.querySelector('.del').addEventListener('click', function(e) {
          e.stopPropagation();
          confirmDel('"' + esc(item.title||'?') + '" löschen?', function() { dbDel('/' + tabState + '/' + k, loadWiki); });
        });
        div.addEventListener('click', function(e) {
          if (e.target.classList.contains('del')) return;
          var ob = makeOv(item.title||'');
          ob.innerHTML = '<div style="font-size:0.88rem;line-height:1.6;white-space:pre-wrap">' + esc(item.body||'') + '</div>';
        });
        list.appendChild(div);
      });
    });
  }

  body.querySelector('#wikiChips').addEventListener('click', function(e) {
    var btn = e.target.closest('.chip'); if (!btn) return;
    body.querySelectorAll('.chip').forEach(function(c) { c.classList.remove('on'); });
    btn.classList.add('on');
    tabState = btn.dataset.wt;
    loadWiki();
  });

  body.querySelector('#wAddBtn').addEventListener('click', function() {
    body.querySelector('#wikiAdd').classList.toggle('open');
  });
  body.querySelector('#wCancel').addEventListener('click', function() {
    body.querySelector('#wikiAdd').classList.remove('open');
  });
  body.querySelector('#wSave').addEventListener('click', function() {
    var title = body.querySelector('#wTitle').value.trim();
    if (!title) { toast('Bitte Titel eingeben'); return; }
    var btext = body.querySelector('#wBody').value.trim();
    dbPost('/' + tabState, {title:title, body:btext, by:me, ts:Date.now()}, function(err, key) {
      body.querySelector('#wTitle').value = '';
      body.querySelector('#wBody').value = '';
      body.querySelector('#wikiAdd').classList.remove('open');
      loadWiki(); toast('✓ Gespeichert');
    });
  });
  loadWiki();
}

var AT_HOLIDAYS = {
  '01-01':'Neujahr', '01-06':'Heilige Drei Könige', '05-01':'Staatsfeiertag',
  '08-15':'Maria Himmelfahrt', '10-26':'Nationalfeiertag', '11-01':'Allerheiligen',
  '12-08':'Maria Empfängnis', '12-25':'1. Weihnachtstag', '12-26':'2. Weihnachtstag'
};
function easterDate(y) {
  var a=y%19,b=Math.floor(y/100),c=y%100,d=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25);
  var g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30,i=Math.floor(c/4),k=c%4;
  var l=(32+2*e+2*i-h-k)%7,m=Math.floor((a+11*h+22*l)/451);
  var mo=Math.floor((h+l-7*m+114)/31),dy=(h+l-7*m+114)%31+1;
  return new Date(y,mo-1,dy);
}
function getMovableHolidays(y) {
  var e = easterDate(y);
  function add(d,n) { var x=new Date(d); x.setDate(x.getDate()+n); return (String(x.getMonth()+1).padStart(2,'0')+'-'+String(x.getDate()).padStart(2,'0')); }
  var h = {};
  h[add(e,-2)]='Karfreitag'; h[add(e,0)]='Ostersonntag'; h[add(e,1)]='Ostermontag';
  h[add(e,39)]='Christi Himmelfahrt'; h[add(e,49)]='Pfingstsonntag'; h[add(e,50)]='Pfingstmontag';
  h[add(e,60)]='Fronleichnam';
  return h;
}
var _movableCache = {};
function isHoliday(date) {
  var y = date.getFullYear();
  if (!_movableCache[y]) _movableCache[y] = getMovableHolidays(y);
  var mo = String(date.getMonth()+1).padStart(2,'0');
  var dy = String(date.getDate()).padStart(2,'0');
  var key = mo + '-' + dy;
  return AT_HOLIDAYS[key] || _movableCache[y][key] || null;
}
function dateToKey(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function keyToDate(s) {
  var p = s.split('-'); return new Date(parseInt(p[0]), parseInt(p[1])-1, parseInt(p[2]));
}
function countdownText(from) {
  var now = new Date(); now.setHours(0,0,0,0);
  var diff = Math.floor((from - now) / 86400000);
  if (diff < 0) return 'bereits begonnen';
  if (diff === 0) return 'beginnt heute!';
  return 'in ' + diff + ' Tag' + (diff===1?'':'en');
}
function showUrlaub() {
  var body = makeOv('Urlaub & Kalender');
  var calViewYear  = new Date().getFullYear();
  var calViewMonth = new Date().getMonth();
  var urlaubData   = {};

  function render() {
    body.innerHTML = '';
    /* ── Neuer Eintrag Button ── */
    var addBtn = document.createElement('button');
    addBtn.className = 'btn-g';
    addBtn.style.cssText = 'width:100%;margin-bottom:0.75rem';
    addBtn.textContent = '+ Urlaub eintragen';
    addBtn.addEventListener('click', function() { showAddUrlaub(); });
    body.appendChild(addBtn);
    /* ── Kalender ── */
    renderCalendar();
    /* ── Urlaubsliste ── */
    renderList();
  }

  function renderCalendar() {
    var oldCal = body.querySelector('.cal-wrap');
    if (oldCal) oldCal.parentNode.removeChild(oldCal);
    var wrap = document.createElement('div');
    wrap.className = 'cal-wrap';
    /* nav */
    var nav = document.createElement('div');
    nav.style.cssText = 'display:flex;align-items:center;justify-content:space-between;margin-bottom:0.5rem';
    var mNames = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
    var lbl = document.createElement('span');
    lbl.style.cssText = 'font-size:0.88rem;font-weight:600';
    lbl.textContent = mNames[calViewMonth] + ' ' + calViewYear;
    var prev = document.createElement('button'); prev.className='btn-d'; prev.style.cssText='padding:0.2rem 0.6rem;font-size:0.9rem'; prev.textContent='‹';
    var next = document.createElement('button'); next.className='btn-d'; next.style.cssText='padding:0.2rem 0.6rem;font-size:0.9rem'; next.textContent='›';
    prev.addEventListener('click', function() {
      calViewMonth--; if (calViewMonth < 0) { calViewMonth=11; calViewYear--; }
      renderCalendar();
    });
    next.addEventListener('click', function() {
      calViewMonth++; if (calViewMonth > 11) { calViewMonth=0; calViewYear++; }
      renderCalendar();
    });
    nav.appendChild(prev); nav.appendChild(lbl); nav.appendChild(next);
    wrap.appendChild(nav);
    /* table */
    var table = document.createElement('table');
    table.className = 'cal';
    var thead = '<thead><tr><th>Mo</th><th>Di</th><th>Mi</th><th>Do</th><th>Fr</th><th>Sa</th><th>So</th></tr></thead>';
    table.innerHTML = thead;
    var tbody = document.createElement('tbody');
    var firstDay = new Date(calViewYear, calViewMonth, 1).getDay();
    firstDay = (firstDay === 0) ? 6 : firstDay - 1;
    var daysInMonth = new Date(calViewYear, calViewMonth+1, 0).getDate();
    var todayStr = todayKey();
    /* build set of urlaub days */
    var urlaubDays = {};
    Object.keys(urlaubData).forEach(function(k) {
      var u = urlaubData[k];
      if (!u.from || !u.to) return;
      var cur = keyToDate(u.from); var end = keyToDate(u.to);
      while (cur <= end) {
        var dk = dateToKey(cur);
        if (!urlaubDays[dk]) urlaubDays[dk] = [];
        urlaubDays[dk].push(u);
        cur.setDate(cur.getDate()+1);
      }
    });
    var day = 1; var tr;
    for (var cell = 0; cell < 42; cell++) {
      if (cell % 7 === 0) { tr = document.createElement('tr'); tbody.appendChild(tr); }
      var td = document.createElement('td');
      if (cell < firstDay || day > daysInMonth) { tr.appendChild(td); continue; }
      var dateObj = new Date(calViewYear, calViewMonth, day);
      var dk = dateToKey(dateObj);
      var holiday = isHoliday(dateObj);
      var isToday = dk === todayStr;
      var uArr = urlaubDays[dk] || [];
      var cls = 'cal-day';
      if (isToday) cls += ' today';
      if (holiday) cls += ' holiday';
      if (uArr.length) {
        var u0 = uArr[0];
        if (dk === u0.from && dk === u0.to) cls += ' urlaub-single';
        else if (dk === u0.from) cls += ' urlaub-start';
        else if (dk === u0.to)   cls += ' urlaub-end';
        else                      cls += ' has-urlaub';
      }
      var span = document.createElement('span');
      span.className = cls;
      span.title = holiday || '';
      span.textContent = day;
      if (holiday) {
        td.title = holiday;
      }
      td.appendChild(span);
      tr.appendChild(td);
      day++;
    }
    table.appendChild(tbody);
    wrap.appendChild(table);
    /* holiday legend */
    var movable = getMovableHolidays(calViewYear);
    var monthHolidays = [];
    for (var hk in AT_HOLIDAYS) {
      var hmo = parseInt(hk.split('-')[0]) - 1;
      if (hmo === calViewMonth) monthHolidays.push({name: AT_HOLIDAYS[hk], key: hk});
    }
    for (var hk2 in movable) {
      var hd = keyToDate(calViewYear + '-' + hk2);
      if (hd.getMonth() === calViewMonth) monthHolidays.push({name: movable[hk2], key: hk2});
    }
    if (monthHolidays.length) {
      var leg = document.createElement('div');
      leg.style.cssText = 'margin-bottom:0.75rem';
      monthHolidays.forEach(function(h) {
        var p = document.createElement('p');
        p.style.cssText = 'font-size:0.68rem;color:var(--red);margin-bottom:0.2rem';
        var parts = h.key.split('-');
        p.textContent = parts[1] + '.' + parts[0] + '. – ' + h.name;
        leg.appendChild(p);
      });
      wrap.appendChild(leg);
    }
    /* insert before list */
    var list = body.querySelector('.urlaub-list');
    if (list) body.insertBefore(wrap, list); else body.appendChild(wrap);
  }

  function renderList() {
    var old = body.querySelector('.urlaub-list');
    if (old) old.parentNode.removeChild(old);
    var listWrap = document.createElement('div');
    listWrap.className = 'urlaub-list';
    var hdr = document.createElement('p');
    hdr.style.cssText = 'font-size:0.65rem;font-weight:600;color:var(--gold);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:0.5rem';
    hdr.textContent = 'Eingetragene Urlaube';
    listWrap.appendChild(hdr);
    var entries = Object.keys(urlaubData).map(function(k) { var u = urlaubData[k]; u.id = k; return u; });
    entries.sort(function(a,b) { return (a.from||'') < (b.from||'') ? -1 : 1; });
    var now = new Date(); now.setHours(0,0,0,0);
    var upcoming = entries.filter(function(u) { return u.to && keyToDate(u.to) >= now; });
    var past     = entries.filter(function(u) { return u.to && keyToDate(u.to) < now; });
    if (!entries.length) { listWrap.innerHTML += '<p class="empty">Noch keine Urlaube eingetragen</p>'; }
    function renderEntry(u) {
      var div = document.createElement('div');
      div.className = 'urlaub-entry';
      var fromD = u.from ? keyToDate(u.from) : null;
      var toD   = u.to   ? keyToDate(u.to)   : null;
      var days = (fromD && toD) ? Math.floor((toD - fromD)/86400000) + 1 : 0;
      var rangeText = u.from && u.to ? (u.from === u.to ? u.from : u.from + ' – ' + u.to + ' (' + days + ' Tage)') : '?';
      var countdown = (fromD && fromD >= now) ? countdownText(fromD) : (toD && toD >= now ? 'läuft gerade' : '');
      div.innerHTML =
        '<div style="display:flex;justify-content:space-between;align-items:flex-start">' +
          '<div>' +
            '<div class="urlaub-name">' + esc(u.who||'?') + (u.note ? ' · <span style="font-weight:400;color:var(--dim)">' + esc(u.note) + '</span>' : '') + '</div>' +
            '<div class="urlaub-range">' + esc(rangeText) + '</div>' +
            (countdown ? '<div class="urlaub-countdown">' + esc(countdown) + '</div>' : '') +
          '</div>' +
          (u.who === me || me === ADMIN ? '<button class="del">✕</button>' : '') +
        '</div>';
      var delBtn = div.querySelector('.del');
      if (delBtn) {
        delBtn.addEventListener('click', function() {
          confirmDel('Urlaub-Eintrag löschen?', function() { dbDel('/urlaub/' + u.id, function() { loadUrlaub(); }); });
        });
      }
      listWrap.appendChild(div);
    }
    upcoming.forEach(renderEntry);
    if (past.length) {
      var pastHdr = document.createElement('p');
      pastHdr.style.cssText = 'font-size:0.62rem;color:var(--dim);text-transform:uppercase;letter-spacing:0.04em;margin:0.75rem 0 0.4rem';
      pastHdr.textContent = 'Vergangen';
      listWrap.appendChild(pastHdr);
      past.slice(0,5).forEach(renderEntry);
    }
    body.appendChild(listWrap);
  }

  function loadUrlaub() {
    dbGet('/urlaub', function(err, data) {
      urlaubData = {};
      if (data && !err) {
        Object.keys(data).forEach(function(k) { urlaubData[k] = data[k]; urlaubData[k].id = k; });
      }
      render();
    });
  }

  function showAddUrlaub() {
    var ob = makeOv('Urlaub eintragen');
    ob.innerHTML =
      '<div class="fg"><label class="fl">Für wen</label><select class="inp" id="uvWho">' +
        TEAM.map(function(n) { return '<option value="' + esc(n) + '"' + (n===me?' selected':'') + '>' + esc(n) + '</option>'; }).join('') +
      '</select></div>' +
      '<div class="fg"><label class="fl">Von</label><input class="inp" type="date" id="uvFrom" value="' + todayKey() + '"></div>' +
      '<div class="fg"><label class="fl">Bis</label><input class="inp" type="date" id="uvTo" value="' + todayKey() + '"></div>' +
      '<div class="fg"><label class="fl">Notiz (optional)</label><input class="inp" id="uvNote" placeholder="z.B. Urlaub Kroatien"></div>' +
      '<button class="btn-g" style="width:100%" id="uvSave">Speichern</button>';
    ob.querySelector('#uvSave').addEventListener('click', function() {
      var who  = ob.querySelector('#uvWho').value;
      var from = ob.querySelector('#uvFrom').value;
      var to   = ob.querySelector('#uvTo').value;
      var note = ob.querySelector('#uvNote').value.trim();
      if (!from || !to) { toast('Bitte Datum auswählen'); return; }
      if (from > to) { toast('Von muss vor Bis liegen'); return; }
      dbPost('/urlaub', {who:who, from:from, to:to, note:note, by:me, ts:Date.now()}, function(err, key) {
        if (key) {
          urlaubData[key] = {who:who, from:from, to:to, note:note, by:me, ts:Date.now(), id:key};
        }
        document.body.removeChild(ob.parentNode);
        loadUrlaub();
        toast('✓ Urlaub eingetragen');
      });
    });
  }

  loadUrlaub();
}

/* ── NAV BADGES ── */
function setBadge(navId, count) {
  var btn = el(navId); if (!btn) return;
  var b = btn.querySelector('.ni-badge');
  if (count > 0) {
    if (!b) { b = document.createElement('span'); b.className = 'ni-badge'; btn.appendChild(b); }
    b.textContent = count > 99 ? '99+' : count;
  } else { if (b) b.parentNode.removeChild(b); }
}
function updateNavBadges() {
  setBadge('nav-aufgaben', tasks.filter(function(t) { return !t.done; }).length);
  var lastSeen = parseInt(localStorage.getItem(CHAT_LAST_SEEN) || '0');
  setBadge('nav-chat', chat.filter(function(m) { return (m.ts||0) > lastSeen && m.user !== me; }).length);
}

/* ── BIND EVENTS ── */
function bind() {
  TABS.forEach(function(tab) {
    var btn = el('nav-' + tab);
    if (btn) btn.addEventListener('click', function() { switchTab(tab); });
  });
  el('userChip').addEventListener('click', function() { if (me) showUserMenu(); else showPicker(); });
  el('umSettings').addEventListener('click', function() {
    el('userMenu').classList.add('hidden');
    el('umOverlay').classList.add('hidden');
    showSettings();
  });
  el('umSwitch').addEventListener('click', showPicker);
  el('umPinChange').addEventListener('click', showPinChange);
  el('umLogout').addEventListener('click', logoutUser);
  el('umOverlay').addEventListener('click', function() {
    el('userMenu').classList.add('hidden');
    el('umOverlay').classList.add('hidden');
  });
  el('pinBack').addEventListener('click', function() {
    pinChangeMode = false; pinChangeStep = 0; pinChangeFirst = '';
    el('pinScreen').classList.add('hidden');
    el('picker').classList.remove('hidden');
  });

  el('addTaskBtn').addEventListener('click', function() { el('taskForm').classList.toggle('open'); });
  el('saveTaskBtn').addEventListener('click', saveTask);
  el('cancelTaskBtn').addEventListener('click', function() { el('taskForm').classList.remove('open'); });
  el('taskTitle').addEventListener('keydown', function(e) { if (e.key === 'Enter') saveTask(); });

  el('taskChips').addEventListener('click', function(e) {
    var btn = e.target.closest('.chip'); if (!btn || !btn.dataset.f) return;
    el('taskChips').querySelectorAll('.chip').forEach(function(c) { c.classList.remove('on'); });
    btn.classList.add('on'); taskFilter = btn.dataset.f; renderTasks();
  });

  el('chatSendBtn').addEventListener('click', sendChat);
  el('chatInp').addEventListener('keydown', function(e) { if (e.key === 'Enter') sendChat(); });

  el('shPrev').addEventListener('click', function() { shiftOff--; loadShift(); });
  el('shNext').addEventListener('click', function() { shiftOff++; loadShift(); });
  el('shCopy').addEventListener('click', copyShiftWeek);

  var sel = el('taskAssign');
  sel.innerHTML = '<option value="Alle">Alle</option>' +
    TEAM.map(function(n) { return '<option value="' + esc(n) + '"' + (n===me?' selected':'') + '>' + esc(n) + '</option>'; }).join('');
}

/* ── INIT ── */
buildPicker();
buildMehr();
buildPinPad();
bind();
tick();
setInterval(tick, 30000);

// Sync PINs from Firebase into localStorage cache (guards against iOS ~7d localStorage wipe)
dbGet('/pins', function(err, dbPins) {
  if (!err && dbPins && typeof dbPins === 'object') {
    var local = getPins();
    Object.keys(dbPins).forEach(function(k) { local[k] = dbPins[k]; });
    savePins(local);
  }
});

if (me) {
  var meIdx = TEAM.indexOf(me);
  el('uEmoji').textContent = EMOJ[meIdx] || '👤';
  el('uLabel').textContent = me;
  el('userChip').classList.add('active');
} else { showPicker(); }

updateDash();
loadDashExtras();
loadTasks();
loadOrders();
loadChat();
loadShift();

chatPollT = setInterval(function() {
  if (el('chatWrap').classList.contains('on')) { loadChat(); }
}, 6000);
</script>
