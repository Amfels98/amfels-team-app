<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Am Fels – Team</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a0a0a">
  <link rel="manifest" href="manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #b8924a; --gold-l: #dfc089;
      --bg: #0a0a0a; --bg2: #131313; --bg3: #1c1c1c; --bg4: #252525;
      --border: rgba(255,255,255,0.07); --text: #f0ebe2; --dim: #666;
      --green: #4caf7d; --red: #e05252; --blue: #5b8dee; --orange: #e8924a;
    }
    html, body { height: 100%; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; -webkit-font-smoothing: antialiased; }
    #app { display: flex; flex-direction: column; height: 100%; height: 100dvh; }

    /* ── HEADER ── */
    .hdr { background: var(--bg2); border-bottom: 1px solid var(--border); padding: max(0.8rem,env(safe-area-inset-top)) 1rem 0.65rem; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .hdr-l .brand { font-size: 0.88rem; font-weight: 600; }
    .hdr-l .sub   { font-size: 0.62rem; color: var(--gold); letter-spacing: 0.05em; margin-top: 0.05rem; }
    .hdr-r { display: flex; align-items: center; gap: 0.5rem; }
    .hdr-time { font-size: 0.72rem; color: var(--dim); font-variant-numeric: tabular-nums; }
    .uchip { background: var(--bg3); border: 1px solid var(--border); border-radius: 20px; padding: 0.28rem 0.65rem 0.28rem 0.5rem; font-size: 0.75rem; color: var(--text); cursor: pointer; display: flex; align-items: center; gap: 0.35rem; touch-action: manipulation; -webkit-tap-highlight-color: transparent; user-select: none; }
    .uchip.active { border-color: rgba(184,146,74,0.5); background: rgba(184,146,74,0.08); }
    .u-emoji { font-size: 1rem; line-height: 1; }
    .u-name  { font-size: 0.72rem; font-weight: 500; }
    .u-arrow { font-size: 0.5rem; color: var(--dim); margin-left: 0.1rem; }

    /* ── LAYOUT ── */
    .content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 0.9rem; }
    .screen { display: none; }
    .screen.on { display: block; }
    #chatWrap { flex: 1; display: none; flex-direction: column; overflow: hidden; min-height: 0; }
    #chatWrap.on { display: flex; }

    /* ── BOTTOM NAV ── */
    .bnav { background: var(--bg2); border-top: 1px solid var(--border); display: flex; padding-bottom: env(safe-area-inset-bottom); flex-shrink: 0; }
    .ni { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 0.55rem 0.2rem; color: var(--dim); font-size: 0.52rem; letter-spacing: 0.03em; text-transform: uppercase; gap: 0.18rem; border: none; background: none; font-family: 'Inter', sans-serif; cursor: pointer; touch-action: manipulation; -webkit-tap-highlight-color: transparent; position: relative; }
    .ni.on { color: var(--gold); }
    .ni-icon { font-size: 1.1rem; line-height: 1; }
    .ni-badge { position:absolute; top:0.28rem; right:calc(50% - 1.1rem); background:var(--red); color:#fff; font-size:0.48rem; font-weight:700; border-radius:8px; padding:0.06rem 0.28rem; min-width:14px; text-align:center; line-height:1.6; pointer-events:none; }

    /* ── COMMON UI ── */
    .sh { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.85rem; }
    .st { font-size: 0.95rem; font-weight: 600; }
    .add-btn { background: var(--gold); color: #000; border: none; width: 29px; height: 29px; border-radius: 50%; font-size: 1.3rem; cursor: pointer; display: flex; align-items: center; justify-content: center; touch-action: manipulation; -webkit-tap-highlight-color: transparent; flex-shrink: 0; }
    .inp { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 12px; padding: 0.75rem 1rem; font-family: 'Inter', sans-serif; font-size: 0.88rem; color: var(--text); outline: none; -webkit-appearance: none; }
    .inp:focus { border-color: var(--gold); }
    textarea.inp { resize: vertical; min-height: 80px; }
    .btn-g { background: var(--gold); color: #000; border: none; padding: 0.8rem 1rem; border-radius: 12px; font-family: 'Inter', sans-serif; font-size: 0.88rem; font-weight: 700; cursor: pointer; touch-action: manipulation; }
    .btn-d { background: var(--bg3); color: var(--dim); border: 1px solid var(--border); padding: 0.8rem 1rem; border-radius: 12px; font-family: 'Inter', sans-serif; font-size: 0.88rem; cursor: pointer; touch-action: manipulation; }
    .row2 { display: flex; gap: 0.5rem; }
    .row2 .btn-g, .row2 .btn-d { flex: 1; }
    .add-form { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 1rem; margin-bottom: 1rem; display: none; }
    .add-form.open { display: block; }
    .fg { margin-bottom: 0.65rem; }
    .fl { font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--dim); display: block; margin-bottom: 0.35rem; }
    .del { background: none; border: none; color: var(--dim); font-size: 1rem; cursor: pointer; padding: 0.25rem; touch-action: manipulation; -webkit-tap-highlight-color: transparent; flex-shrink: 0; }
    .confirm-ov { position:fixed; inset:0; background:rgba(0,0,0,0.65); z-index:2000; display:flex; align-items:flex-end; justify-content:center; }
    .confirm-sheet { background:var(--bg2); border-radius:20px 20px 0 0; padding:1.5rem 1rem max(1.25rem,env(safe-area-inset-bottom)); width:100%; max-width:480px; }
    .confirm-sheet h3 { font-size:1rem; font-weight:700; margin-bottom:0.35rem; }
    .confirm-sheet p { font-size:0.82rem; color:var(--dim); margin-bottom:1.25rem; line-height:1.5; }
    .repeat-badge { font-size:0.6rem; background:rgba(184,146,74,0.15); color:var(--gold); border-radius:4px; padding:0.05rem 0.35rem; font-weight:600; }
    .chips { display: flex; gap: 0.4rem; margin-bottom: 0.75rem; overflow-x: auto; padding-bottom: 0.25rem; }
    .chip { background: var(--bg3); color: var(--dim); border: 1px solid var(--border); border-radius: 20px; padding: 0.28rem 0.85rem; font-size: 0.75rem; cursor: pointer; white-space: nowrap; font-family: 'Inter', sans-serif; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
    .chip.on { background: var(--gold); color: #000; border-color: var(--gold); }
    .empty { color: var(--dim); font-size: 0.85rem; text-align: center; padding: 2rem; }

    /* ── TASKS ── */
    .task { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 0.75rem 1rem; margin-bottom: 0.5rem; display: flex; align-items: flex-start; gap: 0.75rem; }
    .task.done { opacity: 0.38; }
    .task.dringend { border-left: 3px solid var(--red); }
    .task.overdue  { border-left: 3px solid var(--orange); }
    .t-check { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--border); flex-shrink: 0; margin-top: 0.1rem; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; cursor: pointer; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
    .task.done .t-check { background: var(--green); border-color: var(--green); color: #fff; }
    .t-body { flex: 1; min-width: 0; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
    .t-title { font-size: 0.88rem; }
    .task.done .t-title { text-decoration: line-through; }
    .t-meta { font-size: 0.65rem; color: var(--dim); margin-top: 0.18rem; display: flex; flex-wrap: wrap; gap: 0.35rem; align-items: center; }
    .prio-badge { font-size: 0.58rem; font-weight: 600; border-radius: 4px; padding: 0.05rem 0.35rem; text-transform: uppercase; letter-spacing: 0.04em; }
    .prio-dringend { background: rgba(224,82,82,0.15); color: var(--red); }
    .prio-normal   { background: var(--bg4); color: var(--dim); }
    .t-due { font-size: 0.62rem; }
    .t-due.overdue { color: var(--orange); font-weight: 600; }

    /* ── CHAT ── */
    #chatMsgs { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 0.9rem; }
    .chat-bar { display: flex; gap: 0.5rem; padding: 0.75rem; border-top: 1px solid var(--border); background: var(--bg); padding-bottom: max(0.75rem,env(safe-area-inset-bottom)); flex-shrink: 0; }
    .bw { margin-bottom: 0.65rem; }
    .bw.mine  { display: flex; flex-direction: column; align-items: flex-end; }
    .bw.other { display: flex; flex-direction: column; align-items: flex-start; }
    .bubble { padding: 0.6rem 0.9rem; border-radius: 18px; font-size: 0.88rem; max-width: 80%; line-height: 1.45; word-break: break-word; }
    .bw.mine .bubble  { background: var(--gold); color: #000; border-radius: 18px 18px 4px 18px; }
    .bw.other .bubble { background: var(--bg3); border-radius: 18px 18px 18px 4px; }
    .b-who  { font-size: 0.65rem; color: var(--dim); margin-bottom: 0.2rem; }
    .b-time { font-size: 0.6rem;  color: var(--dim); margin-top: 0.2rem; }
    .chat-del { background: none; border: none; color: var(--dim); font-size: 0.65rem; cursor: pointer; padding: 0.1rem 0.25rem; touch-action: manipulation; -webkit-tap-highlight-color: transparent; align-self: flex-end; opacity: 0.6; }

    /* ── ORDERS ── */
    .order { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 0.75rem 1rem; margin-bottom: 0.5rem; display: flex; justify-content: space-between; align-items: center; }
    .o-name { font-size: 0.88rem; }
    .o-qty  { font-size: 0.72rem; color: var(--dim); margin-top: 0.1rem; }

    /* ── SHIFTS ── */
    .sd { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 0.75rem 1rem; margin-bottom: 0.5rem; }
    .sd-name { font-size: 0.7rem; font-weight: 600; color: var(--gold); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.4rem; }
    .sd-row { display: flex; justify-content: space-between; align-items: center; padding: 0.3rem 0; font-size: 0.82rem; border-top: 1px solid var(--border); cursor: pointer; touch-action: manipulation; }
    .sd-badge { font-size: 0.62rem; background: var(--bg4); border-radius: 6px; padding: 0.1rem 0.4rem; color: var(--dim); }
    .sd-names { color: var(--dim); font-size: 0.78rem; }

    /* ── DASHBOARD ── */
    .dw { text-align: center; padding: 1.2rem 1rem 0.8rem; }
    .dw-emoji { font-size: 2.2rem; margin-bottom: 0.35rem; }
    .dw-name  { font-size: 1.3rem; font-weight: 300; letter-spacing: -0.02em; margin-bottom: 0.2rem; }
    .dw-date  { font-size: 0.72rem; color: var(--dim); }
    .dw-shift { font-size: 0.72rem; color: var(--gold); margin-top: 0.15rem; min-height: 1em; }
    .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; margin: 0.7rem 0; }
    .stat { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 0.85rem; text-align: center; }
    .stat-n { font-size: 1.55rem; font-weight: 300; color: var(--gold); }
    .stat-l { font-size: 0.6rem; color: var(--dim); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 0.15rem; }

    /* ── MEHR GRID ── */
    .mehr-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.6rem; }
    .mehr-tile { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 1rem 0.5rem; display: flex; flex-direction: column; align-items: center; gap: 0.4rem; cursor: pointer; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
    .mehr-tile:active { background: var(--bg3); }
    .mehr-icon { font-size: 1.6rem; }
    .mehr-label { font-size: 0.65rem; color: var(--dim); text-align: center; letter-spacing: 0.03em; }

    /* ── OVERLAY ── */
    .ov { position: fixed; inset: 0; background: var(--bg); z-index: 400; display: flex; flex-direction: column; overflow: hidden; }
    .ov-hdr { background: var(--bg2); border-bottom: 1px solid var(--border); padding: max(0.8rem,env(safe-area-inset-top)) 1rem 0.65rem; display: flex; align-items: center; gap: 0.75rem; flex-shrink: 0; }
    .ov-back { background: none; border: none; color: var(--dim); font-size: 1.2rem; cursor: pointer; padding: 0.2rem; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
    .ov-title { font-size: 0.95rem; font-weight: 600; flex: 1; }
    .ov-body { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 0.9rem; }

    /* ── CHECKLIST ── */
    .cl-item { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 0.75rem 1rem; margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.75rem; cursor: pointer; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
    .cl-item.checked { opacity: 0.55; }
    .cl-box { width: 22px; height: 22px; border-radius: 6px; border: 2px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; }
    .cl-item.checked .cl-box { background: var(--green); border-color: var(--green); color: #fff; }
    .cl-text { flex: 1; }
    .cl-label { font-size: 0.88rem; }
    .cl-item.checked .cl-label { text-decoration: line-through; }
    .cl-hint { font-size: 0.68rem; color: var(--dim); margin-top: 0.1rem; }
    .cl-who { font-size: 0.65rem; color: var(--green); margin-top: 0.1rem; }

    /* ── WIKI ── */
    .wiki-item { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 0.75rem 1rem; margin-bottom: 0.5rem; cursor: pointer; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
    .wiki-title { font-size: 0.88rem; font-weight: 500; }
    .wiki-sub { font-size: 0.68rem; color: var(--dim); margin-top: 0.1rem; }

    /* ── CARD ── */
    .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 0.75rem 1rem; margin-bottom: 0.5rem; }

    /* ── SHIFTS TODAY ── */
    .sd.today { border-color: rgba(184,146,74,0.35); }
    .sd.today .sd-name { color: var(--gold-l); }

    /* ── INVENTAR ── */
    .inv-item { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 0.75rem 1rem; margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.75rem; }
    .inv-name { flex: 1; font-size: 0.88rem; }
    .inv-qty { font-size: 0.95rem; font-weight: 600; color: var(--gold); min-width: 2rem; text-align: center; }
    .inv-unit { font-size: 0.68rem; color: var(--dim); }
    .qty-btn { background: var(--bg3); border: 1px solid var(--border); color: var(--text); width: 28px; height: 28px; border-radius: 8px; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }

    /* ── TRINKGELD ── */
    .tg-entry { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 0.75rem 1rem; margin-bottom: 0.5rem; display: flex; justify-content: space-between; align-items: center; }
    .tg-date { font-size: 0.82rem; }
    .tg-amount { font-size: 1rem; font-weight: 600; color: var(--gold); }

    /* ── USER PICKER ── */
    #picker { position: fixed; inset: 0; background: var(--bg); z-index: 900; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; }
    #picker.hidden { display: none; }
    .picker-logo { font-size: 0.55rem; letter-spacing: 0.4em; color: var(--gold); text-transform: uppercase; margin-bottom: 0.6rem; }
    .picker-title { font-size: 2.2rem; font-weight: 200; letter-spacing: -0.03em; margin-bottom: 0.25rem; }
    .picker-sub { font-size: 0.78rem; color: var(--dim); margin-bottom: 2rem; }
    .name-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.65rem; width: 100%; max-width: 320px; }
    .nbtn { background: var(--bg2); border: 1.5px solid var(--border); color: var(--text); padding: 1rem 0.5rem; border-radius: 16px; font-family: 'Inter', sans-serif; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 0.35rem; touch-action: manipulation; -webkit-tap-highlight-color: transparent; transition: border-color 0.15s; }
    .nbtn.current { border-color: var(--gold); background: rgba(184,146,74,0.08); }
    .nbtn:active { background: rgba(184,146,74,0.15); border-color: var(--gold); }
    .n-av { font-size: 1.8rem; }
    .n-nm { font-size: 0.85rem; font-weight: 600; }
    .n-you { font-size: 0.58rem; color: var(--gold); margin-top: 0.05rem; }

    /* ── USER MENU ── */
    #userMenu { position: fixed; top: 0; right: 0; background: var(--bg2); border: 1px solid var(--border); border-radius: 0 0 0 18px; padding: max(1rem,env(safe-area-inset-top)) 1rem 1rem; z-index: 850; min-width: 200px; box-shadow: -4px 4px 24px rgba(0,0,0,0.5); }
    #userMenu.hidden { display: none; }
    .um-user { display: flex; align-items: center; gap: 0.65rem; padding-bottom: 0.75rem; margin-bottom: 0.75rem; border-bottom: 1px solid var(--border); }
    .um-emoji { font-size: 1.8rem; }
    .um-name  { font-size: 0.95rem; font-weight: 600; }
    .um-role  { font-size: 0.62rem; color: var(--dim); margin-top: 0.1rem; }
    .um-btn { width: 100%; text-align: left; background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; padding: 0.6rem 0.85rem; font-family: 'Inter', sans-serif; font-size: 0.82rem; color: var(--text); cursor: pointer; margin-bottom: 0.4rem; touch-action: manipulation; -webkit-tap-highlight-color: transparent; display: flex; align-items: center; gap: 0.5rem; }
    .um-btn:active { background: var(--bg4); }
    .um-btn.danger { color: var(--red); border-color: rgba(224,82,82,0.2); }
    #umOverlay { position: fixed; inset: 0; z-index: 840; }
    #umOverlay.hidden { display: none; }

    /* ── CALENDAR ── */
    .cal { width: 100%; border-collapse: collapse; margin-bottom: 1rem; }
    .cal th { font-size: 0.62rem; color: var(--dim); text-align: center; padding: 0.3rem 0; font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; }
    .cal td { text-align: center; padding: 0.2rem; }
    .cal-day { width: 36px; height: 36px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 0.82rem; cursor: pointer; position: relative; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
    .cal-day:active { background: var(--bg3); }
    .cal-day.today { border: 1.5px solid var(--gold); color: var(--gold); font-weight: 600; }
    .cal-day.holiday { color: var(--red); }
    .cal-day.has-urlaub { background: rgba(184,146,74,0.18); border-radius: 0; }
    .cal-day.urlaub-start { border-radius: 50% 0 0 50%; background: rgba(184,146,74,0.25); }
    .cal-day.urlaub-end   { border-radius: 0 50% 50% 0; background: rgba(184,146,74,0.25); }
    .cal-day.urlaub-single { border-radius: 50%; background: rgba(184,146,74,0.35); }
    .urlaub-entry { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 0.65rem 1rem; margin-bottom: 0.4rem; }
    .urlaub-name { font-size: 0.78rem; font-weight: 500; }
    .urlaub-range { font-size: 0.68rem; color: var(--dim); margin-top: 0.1rem; }
    .urlaub-countdown { font-size: 0.65rem; color: var(--gold); margin-top: 0.1rem; }

    /* ── PIN SCREEN ── */
    #pinScreen { position: fixed; inset: 0; background: var(--bg); z-index: 950; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; }
    #pinScreen.hidden { display: none; }
    .pin-who { text-align: center; margin-bottom: 2rem; }
    .pin-av { font-size: 2.5rem; margin-bottom: 0.5rem; }
    .pin-nm { font-size: 1.2rem; font-weight: 300; margin-bottom: 0.3rem; }
    .pin-hint { font-size: 0.75rem; color: var(--dim); }
    .pin-hint.err { color: var(--red); }
    .pin-dots { display: flex; gap: 1rem; margin-bottom: 2.2rem; }
    .pin-dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid var(--dim); transition: background 0.1s, border-color 0.1s; }
    .pin-dot.filled { background: var(--gold); border-color: var(--gold); }
    .pin-dot.err { background: var(--red); border-color: var(--red); }
    .pin-pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem; width: 100%; max-width: 240px; }
    .pin-key { background: var(--bg3); border: 1px solid var(--border); color: var(--text); height: 64px; border-radius: 50%; font-family: 'Inter', sans-serif; font-size: 1.3rem; font-weight: 300; cursor: pointer; touch-action: manipulation; -webkit-tap-highlight-color: transparent; display: flex; align-items: center; justify-content: center; }
    .pin-key:active { background: var(--bg4); }
    .pin-key.del { font-size: 1rem; color: var(--dim); }
    .pin-key.empty { background: none; border-color: transparent; pointer-events: none; }
    .pin-step { display: flex; gap: 0.4rem; margin-bottom: 0.5rem; }
    .pin-step-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border); }
    .pin-step-dot.on { background: var(--gold); }
    .pin-back { background: none; border: none; color: var(--dim); font-size: 0.82rem; font-family: 'Inter', sans-serif; cursor: pointer; touch-action: manipulation; -webkit-tap-highlight-color: transparent; margin-top: 1.5rem; padding: 0.5rem 1rem; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-8px)} 40%,80%{transform:translateX(8px)} }
    .pin-dots.shake { animation: shake 0.4s ease; }

    /* ── DASHBOARD CALENDAR ── */
    .dcal { margin: 0.35rem 0 0.2rem; }
    .dcal-hdr { display:flex; align-items:center; justify-content:space-between; margin-bottom:0.4rem; flex-wrap:wrap; gap:0.25rem; }
    .dcal-title { font-size:0.78rem; font-weight:600; }
    .dcal-table { width:100%; border-collapse:collapse; }
    .dcal-table th { font-size:0.65rem; color:var(--dim); text-align:center; padding:0.2rem 0; font-weight:500; text-transform:uppercase; letter-spacing:0.03em; }
    .dcal-table td { text-align:center; padding:0.18rem 0; }
    .dcal-cell { display:inline-flex; flex-direction:column; align-items:center; }
    .dcal-num { width:34px; height:34px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:0.85rem; }
    .dcal-num.today { border:2px solid var(--gold); color:var(--gold); font-weight:600; }
    .dcal-num.holiday { color:var(--red); }
    .dcal-num.selected { background:rgba(184,146,74,0.28); color:var(--gold); }
    .dcal-dots { display:flex; gap:2px; margin-top:2px; min-height:6px; justify-content:center; }
    .dcal-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
    .dcal-leg { margin-top:0.4rem; padding-top:0.4rem; border-top:1px solid var(--border); display:flex; flex-wrap:wrap; gap:0.35rem 0.75rem; }
    .dcal-leg-item { font-size:0.6rem; color:var(--dim); display:flex; align-items:center; gap:0.2rem; }

    /* ── MÜLL REMINDER ── */
    .mull-reminder { background:var(--bg2); border:1px solid var(--border); border-radius:12px; padding:0.6rem 1rem; margin-bottom:0.5rem; display:flex; align-items:center; gap:0.65rem; }
    .mull-reminder.today { border-color:rgba(224,82,82,0.4); }
    .mull-reminder.tomorrow { border-color:rgba(184,146,74,0.4); }
    .mr-icon { font-size:1.4rem; }
    .mr-body { flex:1; }
    .mr-when { font-size:0.62rem; color:var(--dim); text-transform:uppercase; letter-spacing:0.04em; }
    .mr-type { font-size:0.88rem; font-weight:500; margin-top:0.05rem; }

    /* ── EINSTELLUNGEN ── */
    .set-section { margin-bottom:1.1rem; }
    .set-section-title { font-size:0.62rem; font-weight:600; color:var(--gold); text-transform:uppercase; letter-spacing:0.07em; margin-bottom:0.45rem; }
    .set-row { display:flex; justify-content:space-between; align-items:center; background:var(--bg2); border:1px solid var(--border); border-radius:11px; padding:0.65rem 0.9rem; margin-bottom:0.35rem; }
    .set-row-label { font-size:0.84rem; }
    .set-row-sub { font-size:0.65rem; color:var(--dim); margin-top:0.1rem; }
    .set-toggle { position:relative; width:42px; height:24px; flex-shrink:0; }
    .set-toggle input { opacity:0; width:0; height:0; }
    .set-toggle-slider { position:absolute; inset:0; background:var(--bg3); border:1px solid var(--border); border-radius:24px; cursor:pointer; transition:background 0.2s; }
    .set-toggle input:checked + .set-toggle-slider { background:var(--gold); border-color:var(--gold); }
    .set-toggle-slider:before { content:''; position:absolute; width:18px; height:18px; left:2px; top:2px; background:#fff; border-radius:50%; transition:transform 0.2s; }
    .set-toggle input:checked + .set-toggle-slider:before { transform:translateX(18px); }
    .set-btn { width:100%; text-align:left; background:var(--bg2); border:1px solid var(--border); border-radius:11px; padding:0.65rem 0.9rem; font-family:'Inter',sans-serif; font-size:0.84rem; color:var(--text); cursor:pointer; margin-bottom:0.35rem; display:flex; justify-content:space-between; align-items:center; touch-action:manipulation; -webkit-tap-highlight-color:transparent; }
    .set-btn:active { background:var(--bg3); }
    .set-btn.danger { color:var(--red); }
    .set-btn .set-arrow { color:var(--dim); font-size:0.75rem; }

    /* ── KI CHAT ── */
    .ki-chat { display:flex; flex-direction:column; gap:0.5rem; max-height:52vh; overflow-y:auto; padding:0.4rem 0; }
    .ki-msg { max-width:86%; padding:0.5rem 0.8rem; border-radius:14px; font-size:0.84rem; line-height:1.45; white-space:pre-wrap; word-break:break-word; }
    .ki-msg.user { align-self:flex-end; background:var(--gold); color:#000; border-bottom-right-radius:4px; }
    .ki-msg.ai { align-self:flex-start; background:var(--bg2); border:1px solid var(--border); border-bottom-left-radius:4px; }
    .ki-msg.ai.loading { color:var(--dim); font-style:italic; }
    .ki-input-row { display:flex; gap:0.5rem; margin-top:0.6rem; }
    .ki-input-row .inp { flex:1; }

    /* ── TOAST ── */
    #toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: var(--bg3); border: 1px solid var(--border); border-radius: 12px; padding: 0.55rem 1.1rem; font-size: 0.78rem; opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 9999; white-space: nowrap; }
  </style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <div class="hdr">
    <div class="hdr-l">
      <div class="brand">Am Fels</div>
      <div class="sub" id="hdrSub">Übersicht</div>
    </div>
    <div class="hdr-r">
      <span class="hdr-time" id="hdrTime"></span>
      <div class="uchip" id="userChip"><span class="u-emoji" id="uEmoji">👤</span><span class="u-name" id="uLabel">––</span><span class="u-arrow">▾</span></div>
    </div>
  </div>

  <!-- Offline Banner -->

  <!-- User Menu -->
  <div id="umOverlay" class="hidden"></div>
  <div id="userMenu" class="hidden">
    <div class="um-user">
      <div class="um-emoji" id="umEmoji"></div>
      <div><div class="um-name" id="umName"></div><div class="um-role" id="umRole"></div></div>
    </div>
    <button class="um-btn" id="umSettings">⚙️ Einstellungen</button>
    <button class="um-btn" id="umSwitch">🔄 Benutzer wechseln</button>
    <button class="um-btn" id="umPinChange">🔑 PIN ändern</button>
    <button class="um-btn danger" id="umLogout">← Abmelden</button>
  </div>

  <!-- Main content (all tabs except chat) -->
  <div class="content" id="mainContent">

    <!-- DASHBOARD -->
    <div class="screen on" id="s-dash">
      <div class="dw">
        <div class="dw-emoji" id="dEmoji">👋</div>
        <div class="dw-name"  id="dName">Hallo!</div>
        <div class="dw-date"  id="dDate"></div>
        <div class="dw-shift" id="dShift"></div>
      </div>
      <div class="stats">
        <div class="stat"><div class="stat-n" id="statOpen">–</div><div class="stat-l">Aufgaben offen</div></div>
        <div class="stat"><div class="stat-n" id="statOrders">–</div><div class="stat-l">Bestellungen</div></div>
      </div>
      <div id="dashCal"></div>
      <div id="dashCalPanel" style="display:none"></div>
      <div id="dashTasks"></div>
      <div id="dashMsg"></div>
    </div>

    <!-- AUFGABEN -->
    <div class="screen" id="s-aufgaben">
      <div class="sh"><span class="st">Aufgaben</span><button class="add-btn" id="addTaskBtn">+</button></div>
      <div class="add-form" id="taskForm">
        <div class="fg"><label class="fl">Titel</label><input class="inp" id="taskTitle" placeholder="Was muss erledigt werden?"></div>
        <div class="fg"><label class="fl">Für</label><select class="inp" id="taskAssign"></select></div>
        <div class="row2">
          <div class="fg" style="flex:1"><label class="fl">Priorität</label><select class="inp" id="taskPrio"><option value="normal">Normal</option><option value="dringend">Dringend</option></select></div>
          <div class="fg" style="flex:1"><label class="fl">Fällig (opt.)</label><input class="inp" type="date" id="taskDue"></div>
        </div>
        <div class="fg"><label class="fl">Wiederholung</label><select class="inp" id="taskRepeat"><option value="none">Einmalig</option><option value="daily">Täglich</option><option value="weekly">Wöchentlich</option><option value="monthly">Monatlich</option></select></div>
        <div class="row2"><button class="btn-g" id="saveTaskBtn">Speichern</button><button class="btn-d" id="cancelTaskBtn">Abbrechen</button></div>
      </div>
      <div class="chips" id="taskChips">
        <button class="chip on" data-f="alle">Alle</button>
        <button class="chip" data-f="offen">Offen</button>
        <button class="chip" data-f="meine">Meine</button>
        <button class="chip" data-f="erledigt">Erledigt</button>
      </div>
      <div id="taskList"></div>
    </div>

    <!-- SCHICHTPLAN -->
    <div class="screen" id="s-schicht">
      <div class="sh">
        <span class="st">Schichtplan</span>
        <div style="display:flex;align-items:center;gap:0.4rem">
          <button class="btn-d" id="shPrev" style="padding:0.3rem 0.75rem;font-size:1rem">‹</button>
          <span id="shLabel" style="font-size:0.75rem;color:var(--dim);min-width:50px;text-align:center"></span>
          <button class="btn-d" id="shNext" style="padding:0.3rem 0.75rem;font-size:1rem">›</button>
          <button class="btn-d" id="shCopy" style="padding:0.3rem 0.65rem;font-size:0.7rem;color:var(--gold);border-color:rgba(184,146,74,0.4)" title="Woche kopieren">⧉</button>
        </div>
      </div>
      <div id="shiftGrid"></div>
    </div>

    <!-- MEHR -->
    <div class="screen" id="s-mehr">
      <div class="sh" style="margin-bottom:1rem"><span class="st">Mehr</span></div>
      <div class="mehr-grid" id="mehrGrid"></div>
    </div>

  </div>

  <!-- Chat (own flex column for internal scroll) -->
  <div id="chatWrap">
    <div id="chatMsgs"></div>
    <div class="chat-bar">
      <input class="inp" id="chatInp" placeholder="Nachricht…" style="flex:1">
      <button class="btn-g" id="chatSendBtn" style="padding:0.75rem 1rem">→</button>
    </div>
  </div>

  <!-- Bottom Nav -->
  <div class="bnav">
    <button class="ni on" id="nav-dash"><span class="ni-icon">🏠</span>Start</button>
    <button class="ni" id="nav-aufgaben"><span class="ni-icon">✅</span>Aufgaben</button>
    <button class="ni" id="nav-chat"><span class="ni-icon">💬</span>Chat</button>
    <button class="ni" id="nav-schicht"><span class="ni-icon">📅</span>Schicht</button>
    <button class="ni" id="nav-mehr"><span class="ni-icon">⋯</span>Mehr</button>
  </div>
</div>

<!-- User Picker -->
<div id="picker" class="hidden">
  <div class="picker-logo">Restaurant Am Fels</div>
  <div class="picker-title">Willkommen</div>
  <div class="picker-sub">Wer bist du heute?</div>
  <div class="name-grid" id="nameGrid"></div>
</div>

<!-- PIN Screen -->
<div id="pinScreen" class="hidden">
  <div class="pin-who">
    <div class="pin-av" id="pinAv"></div>
    <div class="pin-nm" id="pinNm"></div>
    <div class="pin-hint" id="pinHint">PIN eingeben</div>
  </div>
  <div class="pin-step hidden" id="pinStep">
    <div class="pin-step-dot on" id="ps0"></div>
    <div class="pin-step-dot" id="ps1"></div>
  </div>
  <div class="pin-dots" id="pinDots">
    <div class="pin-dot" id="pd0"></div>
    <div class="pin-dot" id="pd1"></div>
    <div class="pin-dot" id="pd2"></div>
    <div class="pin-dot" id="pd3"></div>
  </div>
  <div class="pin-pad" id="pinPad"></div>
  <button class="pin-back" id="pinBack">← Zurück</button>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
/* ── CONFIG ── */
var DB   = 'https://apfels-team-default-rtdb.europe-west1.firebasedatabase.app/amfels';
var TEAM = ['Leon','Sasho','Patrik','Tea','Daniel'];
var ADMIN = 'Leon';
var EMOJ = ['👑','👨‍🍳','🍺','👩‍🍳','🍳'];

/* ── STATE ── */
var me         = localStorage.getItem('af_user') || '';
var tasks      = [];
var orders     = [];
var chat       = [];
var inventar   = [];
var trinkgeld  = [];
var mullData     = {};
var dashCalYear    = new Date().getFullYear();
var dashCalMonth   = new Date().getMonth();
var shiftOff       = 0;
var pinChangeMode  = false;
var pinChangeStep  = 0;
var pinChangeFirst = '';
var CHAT_LAST_SEEN = 'af_chat_seen';
var shiftDb    = {};
var taskFilter = 'alle';
var chatPollT  = null;

/* ── DB HELPERS ── */
function el(id) { return document.getElementById(id); }

function dbGet(path, cb) {
  fetch(DB + path + '.json', {cache:'no-store'})
    .then(function(r) { return r.json(); })
    .then(function(d) { cb(null, d); })
    .catch(function(e) { cb(e, null); });
}
function dbPut(path, data, cb) {
  fetch(DB + path + '.json', {method:'PUT', body:JSON.stringify(data), headers:{'Content-Type':'application/json'}})
    .then(function() { if (cb) cb(null); }).catch(function() { if (cb) cb('err'); });
}
function dbPost(path, data, cb) {
  fetch(DB + path + '.json', {method:'POST', body:JSON.stringify(data), headers:{'Content-Type':'application/json'}})
    .then(function(r) { return r.json(); })
    .then(function(d) { if (cb) cb(null, d && d.name); }).catch(function() { if (cb) cb('err', null); });
}
function dbDel(path, cb) {
  fetch(DB + path + '.json', {method:'DELETE'})
    .then(function() { if (cb) cb(); }).catch(function() { if (cb) cb(); });
}

/* ── PUSH NOTIFICATIONS (ntfy.sh) ── */
var NTFY_DEFAULT = 'amfels98team2026';
function sendPushNotif(title, body, priority) {
  var topic = localStorage.getItem('af_ntfy_topic') || NTFY_DEFAULT;
  if (!getSetting('af_ntfy_enabled', true)) return;
  var headers = {'Title': title, 'Content-Type': 'text/plain'};
  if (priority === 'urgent') { headers['Priority'] = 'urgent'; headers['Tags'] = 'rotating_light'; }
  else if (priority === 'high') { headers['Priority'] = 'high'; headers['Tags'] = 'bell'; }
  else { headers['Tags'] = 'memo'; }
  fetch('https://ntfy.sh/' + encodeURIComponent(topic), {method:'POST', headers:headers, body:body}).catch(function(){});
}

/* ── CONFIRM DELETE ── */
function confirmDel(msg, onConfirm) {
  var ov = document.createElement('div'); ov.className = 'confirm-ov';
  var sh = document.createElement('div'); sh.className = 'confirm-sheet';
  sh.innerHTML = '<h3>Löschen?</h3><p>' + esc(msg) + '</p><div class="row2"><button class="btn-d" id="cdNo">Abbrechen</button><button style="flex:1;background:var(--red);color:#fff;border:none;padding:0.8rem;border-radius:12px;font-family:inherit;font-size:0.88rem;font-weight:700;cursor:pointer" id="cdYes">Löschen</button></div>';
  ov.appendChild(sh);
  document.body.appendChild(ov);
  function close() { if (ov.parentNode) ov.parentNode.removeChild(ov); }
  sh.querySelector('#cdNo').addEventListener('click', close);
  sh.querySelector('#cdYes').addEventListener('click', function() { close(); onConfirm(); });
  ov.addEventListener('click', function(e) { if (e.target === ov) close(); });
}
function calcNextDate(from, repeat) {
  var d = new Date(from); if (isNaN(d.getTime())) d = new Date();
  if (repeat === 'daily')   d.setDate(d.getDate() + 1);
  else if (repeat === 'weekly')  d.setDate(d.getDate() + 7);
  else if (repeat === 'monthly') d.setMonth(d.getMonth() + 1);
  return d.toISOString().slice(0, 10);
}

/* ── UI HELPERS ── */
function toast(msg) {
  var t = el('toast');
  t.textContent = msg;
  t.style.opacity = '1';
  setTimeout(function() { t.style.opacity = '0'; }, 2400);
}
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function fmtTime(ts) {
  var d = new Date(ts);
  return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}
function fmtDate(ts) {
  var d = new Date(ts);
  return String(d.getDate()).padStart(2,'0') + '.' + String(d.getMonth()+1).padStart(2,'0') + '.';
}
function isSameDay(ts1, ts2) {
  var a = new Date(ts1), b = new Date(ts2);
  return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
}
function todayKey() {
  var d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function makeOv(title, onBack) {
  var ov = document.createElement('div');
  ov.className = 'ov';
  ov.innerHTML =
    '<div class="ov-hdr">' +
      '<button class="ov-back" id="ovBackBtn">←</button>' +
      '<div class="ov-title">' + esc(title) + '</div>' +
    '</div>' +
    '<div class="ov-body" id="ovBody"></div>';
  document.body.appendChild(ov);
  ov.querySelector('#ovBackBtn').addEventListener('click', function() {
    document.body.removeChild(ov);
    if (onBack) onBack();
  });
  return ov.querySelector('#ovBody');
}

/* ── USER PICKER ── */
function buildPicker() {
  var grid = el('nameGrid');
  grid.innerHTML = '';
  TEAM.forEach(function(name, i) {
    var btn = document.createElement('button');
    btn.className = 'nbtn' + (name === me ? ' current' : '');
    btn.innerHTML = '<span class="n-av">' + EMOJ[i] + '</span><span class="n-nm">' + esc(name) + '</span>' + (name === me ? '<span class="n-you">Du</span>' : '');
    btn.addEventListener('click', (function(n) { return function() {
      if (n === me) { el('picker').classList.add('hidden'); return; }
      showPinScreen(n);
    }; })(name));
    grid.appendChild(btn);
  });
}
function loginAs(name) {
  me = name;
  localStorage.setItem('af_user', name);
  el('picker').classList.add('hidden');
  el('pinScreen').classList.add('hidden');
  var idx = TEAM.indexOf(name);
  el('uEmoji').textContent = EMOJ[idx] || '👤';
  el('uLabel').textContent = name;
  el('userChip').classList.add('active');
  updateDash();
  loadDashExtras();
  loadTasks();
  loadOrders();
  loadChat();
  toast('Hallo, ' + name + '!');
}
function showPicker() {
  buildPicker();
  el('picker').classList.remove('hidden');
  el('pinScreen').classList.add('hidden');
  el('userMenu').classList.add('hidden');
  el('umOverlay').classList.add('hidden');
}
function showUserMenu() {
  if (!me) { showPicker(); return; }
  var idx = TEAM.indexOf(me);
  el('umEmoji').textContent = EMOJ[idx] || '👤';
  el('umName').textContent = me;
  el('umRole').textContent = me === ADMIN ? 'Administrator' : 'Team';
  el('userMenu').classList.remove('hidden');
  el('umOverlay').classList.remove('hidden');
}
function showPinChange() {
  if (!me) return;
  el('userMenu').classList.add('hidden');
  el('umOverlay').classList.add('hidden');
  var pins = getPins();
  pinChangeMode  = true;
  pinChangeStep  = pins[me] ? 0 : 1;
  pinChangeFirst = '';
  pinTarget = me; pinBuffer = ''; pinSetupMode = false; pinSetupFirst = '';
  var idx = TEAM.indexOf(me);
  el('pinAv').textContent = EMOJ[idx] || '?';
  el('pinNm').textContent = me;
  var hints = ['Aktuellen PIN eingeben', 'Neuen PIN eingeben (4 Stellen)', 'Neuen PIN bestätigen'];
  el('pinHint').textContent = hints[pinChangeStep];
  el('pinHint').className = 'pin-hint';
  el('pinStep').classList.remove('hidden');
  el('ps0').className = 'pin-step-dot on'; el('ps1').className = 'pin-step-dot';
  updatePinDots();
  el('pinScreen').classList.remove('hidden');
}
function logoutUser() {
  me = '';
  localStorage.removeItem('af_user');
  el('userChip').classList.remove('active');
  el('uEmoji').textContent = '👤';
  el('uLabel').textContent = '––';
  el('userMenu').classList.add('hidden');
  el('umOverlay').classList.add('hidden');
  showPicker();
}

/* ── PIN ── */
var PIN_STORE = 'af_pins';
var PIN_LOCK  = 'af_lock';
var pinTarget = '';
var pinBuffer = '';
var pinSetupMode = false;
var pinSetupFirst = '';

function getPins()  { try { return JSON.parse(localStorage.getItem(PIN_STORE) || '{}'); } catch(e) { return {}; } }
function getLocks() { try { return JSON.parse(localStorage.getItem(PIN_LOCK)  || '{}'); } catch(e) { return {}; } }
function savePins(p)  { localStorage.setItem(PIN_STORE, JSON.stringify(p)); }
function saveLocks(l) { localStorage.setItem(PIN_LOCK,  JSON.stringify(l)); }

function showPinScreen(name) {
  var locks = getLocks();
  var lock = locks[name] || {};
  if (lock.count >= 5 && lock.ts && (Date.now() - lock.ts) < 5*60*1000) {
    var rem = Math.ceil((5*60*1000 - (Date.now() - lock.ts)) / 60000);
    toast('Gesperrt noch ' + rem + ' Min.');
    return;
  }
  var pins = getPins();
  pinTarget     = name;
  pinBuffer     = '';
  pinSetupFirst = '';
  var idx = TEAM.indexOf(name);
  el('pinAv').textContent = EMOJ[idx] || '?';
  el('pinNm').textContent = name;
  el('picker').classList.add('hidden');
  el('pinScreen').classList.remove('hidden');
  updatePinDots();

  if (pins[name]) {
    pinSetupMode = false;
    el('pinHint').textContent = 'PIN eingeben';
    el('pinHint').className = 'pin-hint';
    el('pinStep').classList.add('hidden');
  } else {
    // localStorage may have been cleared (iOS Safari ~7d TTL) — check Firebase first
    pinSetupMode = false;
    el('pinHint').textContent = '…';
    el('pinHint').className = 'pin-hint';
    el('pinStep').classList.add('hidden');
    dbGet('/pins/' + name, function(err, fbPin) {
      if (!err && fbPin) {
        var p = getPins(); p[name] = fbPin; savePins(p);
        pinSetupMode = false;
        el('pinHint').textContent = 'PIN eingeben';
        el('pinHint').className = 'pin-hint';
        el('pinStep').classList.add('hidden');
      } else {
        pinSetupMode = true;
        el('pinHint').textContent = 'Neuen PIN festlegen (4 Stellen)';
        el('pinHint').className = 'pin-hint';
        el('pinStep').classList.remove('hidden');
        el('ps0').className = 'pin-step-dot on';
        el('ps1').className = 'pin-step-dot';
      }
    });
  }
}

function updatePinDots() {
  for (var i = 0; i < 4; i++) {
    el('pd' + i).className = 'pin-dot' + (i < pinBuffer.length ? ' filled' : '');
  }
}

function pinKeyPress(k) {
  if (k === 'del') {
    pinBuffer = pinBuffer.slice(0, -1);
    updatePinDots();
    return;
  }
  if (pinBuffer.length >= 4) return;
  pinBuffer += k;
  updatePinDots();
  if (pinBuffer.length === 4) { setTimeout(checkPinInput, 80); }
}

function checkPinInput() {
  if (pinChangeMode) {
    var pins = getPins();
    var hints = ['Aktuellen PIN eingeben', 'Neuen PIN eingeben (4 Stellen)', 'Neuen PIN bestätigen'];
    if (pinChangeStep === 0) {
      if (pinBuffer === pins[me]) {
        pinChangeStep = 1; pinBuffer = ''; updatePinDots();
        el('pinHint').textContent = hints[1]; el('pinHint').className = 'pin-hint';
        el('ps0').className = 'pin-step-dot'; el('ps1').className = 'pin-step-dot on';
      } else { pinWrong('Falscher PIN'); }
    } else if (pinChangeStep === 1) {
      pinChangeFirst = pinBuffer; pinChangeStep = 2; pinBuffer = ''; updatePinDots();
      el('pinHint').textContent = hints[2]; el('pinHint').className = 'pin-hint';
    } else {
      if (pinBuffer === pinChangeFirst) {
        pins[me] = pinBuffer; savePins(pins);
        dbPut('/pins/' + me, pinBuffer);
        pinChangeMode = false;
        el('pinScreen').classList.add('hidden');
        el('pinStep').classList.add('hidden');
        toast('✓ PIN geändert');
      } else {
        pinChangeStep = 1; pinChangeFirst = '';
        pinWrong('PINs stimmen nicht überein');
        setTimeout(function() { el('pinHint').textContent = hints[1]; el('pinHint').className = 'pin-hint'; }, 650);
      }
    }
    return;
  }
  if (pinSetupMode) {
    if (!pinSetupFirst) {
      pinSetupFirst = pinBuffer;
      pinBuffer = '';
      updatePinDots();
      el('pinHint').textContent = 'PIN bestätigen';
      el('ps0').className = 'pin-step-dot';
      el('ps1').className = 'pin-step-dot on';
      return;
    }
    if (pinBuffer === pinSetupFirst) {
      var pins = getPins();
      pins[pinTarget] = pinBuffer;
      savePins(pins);
      dbPut('/pins/' + pinTarget, pinBuffer);
      loginAs(pinTarget);
    } else {
      pinSetupFirst = '';
      pinWrong('PINs stimmen nicht überein');
      el('pinHint').textContent = 'Nochmal: Neuen PIN festlegen';
    }
  } else {
    var pins2 = getPins();
    if (pinBuffer === pins2[pinTarget]) {
      var locks = getLocks();
      delete locks[pinTarget];
      saveLocks(locks);
      loginAs(pinTarget);
    } else {
      var locks2 = getLocks();
      if (!locks2[pinTarget]) locks2[pinTarget] = {count:0, ts:0};
      locks2[pinTarget].count = (locks2[pinTarget].count || 0) + 1;
      if (locks2[pinTarget].count >= 5) { locks2[pinTarget].ts = Date.now(); }
      saveLocks(locks2);
      var left = 5 - locks2[pinTarget].count;
      if (locks2[pinTarget].count >= 5) {
        pinWrong('Gesperrt für 5 Min.');
        setTimeout(function() { el('pinScreen').classList.add('hidden'); el('picker').classList.remove('hidden'); }, 1000);
      } else {
        pinWrong('Falscher PIN – noch ' + left + ' Versuch' + (left === 1 ? '' : 'e'));
      }
    }
  }
}

function pinWrong(msg) {
  for (var i = 0; i < 4; i++) { el('pd' + i).className = 'pin-dot err'; }
  el('pinHint').textContent = msg;
  el('pinHint').className = 'pin-hint err';
  var dotsEl = el('pinDots');
  dotsEl.classList.add('shake');
  setTimeout(function() {
    dotsEl.classList.remove('shake');
    pinBuffer = '';
    updatePinDots();
    if (!el('pinHint').className.match(/err/) || msg === 'Gesperrt für 5 Min.') return;
    el('pinHint').textContent = pinSetupMode ? (pinSetupFirst ? 'PIN bestätigen' : 'Neuen PIN festlegen (4 Stellen)') : 'PIN eingeben';
    el('pinHint').className = 'pin-hint';
  }, 600);
}

function buildPinPad() {
  var pad = el('pinPad');

  var keys = ['1','2','3','4','5','6','7','8','9','','0','del'];
  keys.forEach(function(k) {

function renderDashTasks() {
  var container = el('dashTasks');
  if (!container) return;
  container.innerHTML = '';
  if (!getSetting(SET_TASK_REMIND, true)) return;
  var today = todayKey();
  var overdue  = tasks.filter(function(t) { return !t.done && t.due && t.due < today; });
  var dueToday = tasks.filter(function(t) { return !t.done && t.due === today; });
  if (!overdue.length && !dueToday.length) return;
  function makeRow(t, isOverdue) {
    var div = document.createElement('div');
    div.className = 'task' + (t.priority === 'dringend' ? ' dringend' : '') + (isOverdue ? ' overdue' : '');
    div.style.marginBottom = '0.4rem';
    div.innerHTML =
      '<div class="t-check"></div>' +
      '<div class="t-body"><div class="t-title">' + esc(t.title) + '</div>' +
        '<div class="t-meta">' +
          (t.priority === 'dringend' ? '<span class="prio-badge prio-dringend">Dringend</span>' : '') +
          esc(t.assign || 'Alle') +
        '</div>' +
      '</div>';
    div.querySelector('.t-check').addEventListener('click', function() { toggleTask(t.id); });
    return div;
  }
  if (overdue.length) {
    var oHdr = document.createElement('p');
    oHdr.style.cssText = 'font-size:0.6rem;font-weight:600;color:var(--red);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:0.4rem';
    oHdr.textContent = '⚠ Überfällig';
    container.appendChild(oHdr);
    overdue.forEach(function(t) { container.appendChild(makeRow(t, true)); });
  }
  if (dueToday.length) {
    var tHdr = document.createElement('p');
    tHdr.style.cssText = 'font-size:0.6rem;font-weight:600;color:var(--gold);text-transform:uppercase;letter-spacing:0.05em;margin:' + (overdue.length ? '0.75rem 0 0.4rem' : '0 0 0.4rem');
    tHdr.textContent = 'Heute fällig';
    container.appendChild(tHdr);
    dueToday.forEach(function(t) { container.appendChild(makeRow(t, false)); });
  }
}
function loadTasks() {
  dbGet('/tasks', function(err, data) {
    tasks = [];
    if (data && !err) {
      Object.keys(data).forEach(function(k) { var t = data[k]; t.id = k; tasks.push(t); });
      tasks.sort(function(a,b) { return (b.ts||0)-(a.ts||0); });
    }
    renderTasks(); updateDash(); renderDashCal(); renderDashTasks(); updateNavBadges();
  });
}
function renderTasks() {
  var list = el('taskList');
  var today = todayKey();
  var shown = tasks.filter(function(t) {
    if (taskFilter === 'offen')    return !t.done;
    if (taskFilter === 'meine')    return t.assign === me;
    if (taskFilter === 'erledigt') return !!t.done;
    return !t.done; /* "alle" shows open tasks; done shown below */
  });
  shown.sort(function(a, b) {
    function rank(t) {
      if (t.done) return 3;
      var overdue = t.due && t.due < today;
      if (overdue && t.priority === 'dringend') return 0;
      if (overdue || t.priority === 'dringend') return 1;
      return 2;
    }
    var ra = rank(a), rb = rank(b);
    if (ra !== rb) return ra - rb;
    return (b.ts||0) - (a.ts||0);
  });
  if (!shown.length) { list.innerHTML = '<p class="empty">Keine Aufgaben</p>'; return; }
  list.innerHTML = '';
  shown.forEach(function(t) {
    var isOverdue = !t.done && t.due && t.due < today;
    var isDringend = !t.done && t.priority === 'dringend';
    var div = document.createElement('div');
    div.className = 'task' + (t.done ? ' done' : '') + (isDringend ? ' dringend' : '') + (isOverdue ? ' overdue' : '');
    var prioHtml = isDringend ? '<span class="prio-badge prio-dringend">Dringend</span>' : '';
    var dueHtml = t.due ? '<span class="t-due' + (isOverdue ? ' overdue' : '') + '">Bis ' + esc(t.due) + '</span>' : '';
    var repMap = {daily:'täglich',weekly:'wöchentlich',monthly:'monatlich'};
    var repHtml = (t.repeat && t.repeat !== 'none') ? '<span class="repeat-badge">♻ ' + (repMap[t.repeat]||t.repeat) + '</span>' : '';
    div.innerHTML =
      '<div class="t-check">' + (t.done ? '✓' : '') + '</div>' +
      '<div class="t-body"><div class="t-title">' + esc(t.title) + '</div>' +
        '<div class="t-meta">' + prioHtml + repHtml + esc(t.assign || 'Alle') + (t.by ? ' · von ' + esc(t.by) : '') + (t.ts ? ' · ' + fmtDate(t.ts) : '') + dueHtml + '</div></div>' +
      '<button class="del">✕</button>';
    div.querySelector('.t-check').addEventListener('click', function() { toggleTask(t.id); });
    div.querySelector('.t-body').addEventListener('click', function() { toggleTask(t.id); });
    div.querySelector('.del').addEventListener('click', function(e) { e.stopPropagation(); deleteTask(t.id); });
    list.appendChild(div);
  });
}
function toggleTask(id) {
  var t = null; tasks.forEach(function(x) { if (x.id === id) t = x; });
  if (!t) return;
  var wasDone = t.done;
  t.done = !t.done;
  dbPut('/tasks/' + id, t);
  if (!wasDone && t.repeat && t.repeat !== 'none') {
    var nextDate = calcNextDate(t.due || todayKey(), t.repeat);
    var next = {title:t.title, assign:t.assign, done:false, by:t.by, ts:Date.now(), priority:t.priority, repeat:t.repeat, due:nextDate};
    dbPost('/tasks', next, function(err, key) {
      if (key) { next.id = key; tasks.push(next); }
      renderTasks(); updateDash(); renderDashTasks(); renderDashCal(); updateNavBadges();
      toast('✓ Erledigt · Nächster: ' + nextDate);
    });
    return;
  }
  renderTasks(); updateDash(); renderDashTasks(); renderDashCal(); updateNavBadges();
}
function deleteTask(id) {
  var t = null; tasks.forEach(function(x) { if (x.id === id) t = x; });
  var label = t ? '"' + t.title + '"' : 'diese Aufgabe';
  confirmDel(label + ' wirklich löschen?', function() {
    tasks = tasks.filter(function(x) { return x.id !== id; });
    dbDel('/tasks/' + id);
    renderTasks(); updateDash(); toast('Gelöscht');
  });
}
function saveTask() {
  var title = el('taskTitle').value.trim();
  if (!title) { toast('Bitte Titel eingeben'); return; }
  var assign = el('taskAssign').value;
  var prio   = el('taskPrio').value;
  var due    = el('taskDue').value;
  var repeat = el('taskRepeat').value;
  var task = {title:title, assign:assign, done:false, by:me, ts:Date.now(), priority:prio};
  if (due) task.due = due;
  if (repeat && repeat !== 'none') task.repeat = repeat;
  dbPost('/tasks', task, function(err, key) {
    if (key) { task.id = key; tasks.unshift(task); }
    el('taskTitle').value = ''; el('taskDue').value = '';
    el('taskRepeat').value = 'none';
    el('taskForm').classList.remove('open');
    renderTasks(); updateDash(); toast('✓ Aufgabe gespeichert');
    var notifBody = title + (assign && assign !== 'Alle' ? ' → ' + assign : '') + (me ? ' (von ' + me + ')' : '');
    if (prio === 'dringend' && getSetting('af_ntfy_urgent', true)) {
      sendPushNotif('🚨 Dringende Aufgabe', notifBody, 'urgent');
    } else if (getSetting('af_ntfy_tasks', true)) {
      sendPushNotif('📋 Neue Aufgabe', notifBody, 'default');
    }
  });
}

function renderChat() {
  var wrap = el('chatMsgs');
  if (!chat.length) { wrap.innerHTML = '<p class="empty">Noch keine Nachrichten</p>'; return; }
  wrap.innerHTML = '';
  var lastTs = null;

      var sep = document.createElement('div');
      sep.style.cssText = 'text-align:center;font-size:0.62rem;color:var(--dim);margin:0.6rem 0;letter-spacing:0.04em';
      var isToday = isSameDay(m.ts||0, now);
      var isYesterday = isSameDay(m.ts||0, now - 86400000);
      sep.textContent = isToday ? 'Heute' : isYesterday ? 'Gestern' : fmtDate(m.ts||0);
      wrap.appendChild(sep);
      lastTs = m.ts||0;
    }
    var mine = m.user === me;
    var div = document.createElement('div');
    div.className = 'bw ' + (mine ? 'mine' : 'other');
    div.innerHTML =
      (!mine ? '<div class="b-who">' + esc(m.user||'?') + '</div>' : '') +
      '<div class="bubble">' + esc(m.text||'') + '</div>' +
      '<div style="display:flex;align-items:center;gap:0.3rem">' +
        '<div class="b-time">' + fmtTime(m.ts||0) + '</div>' +
        (mine && m.id ? '<button class="chat-del">✕</button>' : '') +

function mullIcon(type) {

  return ic[type] || '🗑️';
}
function buildMullDays(data, year, month) {
  var days = {};
  if (!data) return days;
  var monthStart = new Date(year, month, 1);
  var monthEnd   = new Date(year, month + 1, 0);
  Object.keys(data).forEach(function(k) {
    var m = data[k];
    if (!m || !m.date) return;
    var startDate = keyToDate(m.date);
    var repeat    = m.repeat || 'none';
    var repeatEnd = m.repeatEnd ? keyToDate(m.repeatEnd) : new Date(year + 3, 11, 31);
    function addDay(d) {
      if (d > repeatEnd) return;
      var dk = dateToKey(d); if (!days[dk]) days[dk] = []; days[dk].push(m.type);
    }
    if (repeat === 'none') {
      if (startDate >= monthStart && startDate <= monthEnd) addDay(startDate);
    } else if (repeat === 'monthly') {
      var md = new Date(year, month, startDate.getDate());
      if (md >= startDate && md <= monthEnd && md.getMonth() === month) addDay(md);
    } else {
      var interval = repeat === 'weekly' ? 7 : repeat === 'biweekly' ? 14 : repeat === 'fourweekly' ? 28 : 14;
      var cur = new Date(startDate);
      while (cur < monthStart) cur.setDate(cur.getDate() + interval);
      var safety = 0;
      while (cur <= monthEnd && safety++ < 20) { addDay(new Date(cur)); cur.setDate(cur.getDate() + interval); }
    }
  });
  return days;
}
function getMullReminders() {
  var reminders = [];
  var now = new Date(); now.setHours(0,0,0,0);
  var tmr = new Date(now); tmr.setDate(tmr.getDate() + 1);
  var td = buildMullDays(mullData, now.getFullYear(), now.getMonth());
  var tm = buildMullDays(mullData, tmr.getFullYear(), tmr.getMonth());
  var tdk = dateToKey(now), tmk = dateToKey(tmr);
  (td[tdk] || []).forEach(function(t) { reminders.push({when:'today',   type:t}); });
  (tm[tmk] || []).forEach(function(t) { reminders.push({when:'tomorrow',type:t}); });
  return reminders;
}

var DAYS_DE  = ['Mo','Di','Mi','Do','Fr','Sa','So'];
var SCHICHTEN = [{k:'frueh',l:'Früh',t:'8–14'},{k:'mittag',l:'Mittag',t:'12–17'},{k:'abend',l:'Abend',t:'17–23'}];
function isoWeek(d) {
  var dt = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  var day = dt.getUTCDay() || 7; dt.setUTCDate(dt.getUTCDate() + 4 - day);
  var y1 = new Date(Date.UTC(dt.getUTCFullYear(),0,4));
  return 1 + Math.round(((dt-y1)/86400000 - 3 + ((new Date(Date.UTC(y1.getUTCFullYear(),0,4)).getUTCDay())||7))/7);
}
function weekKey(off) {
  var now = new Date(); var day = now.getDay() || 7;
  var mon = new Date(now); mon.setDate(now.getDate() - day + 1 + off*7);
  return mon.getFullYear() + '-W' + String(isoWeek(mon)).padStart(2,'0');
}
function getWeekDates(off) {
  var now = new Date(); var day = now.getDay() || 7;
  var mon = new Date(now); mon.setDate(now.getDate() - day + 1 + off*7);
  var dates = [];
  for (var i = 0; i < 7; i++) {
    var d = new Date(mon); d.setDate(mon.getDate() + i);
    dates.push(d);
  }
  return dates;
}
function todayDayDE() {
  var d = new Date().getDay();
  return DAYS_DE[d === 0 ? 6 : d - 1];
}
function copyShiftWeek() {
  if (!Object.keys(shiftDb).length) { toast('Aktuelle Woche ist leer'); return; }
  var dstKey = weekKey(shiftOff + 1);
  var count = 0;
  Object.keys(shiftDb).forEach(function(day) {
    Object.keys(shiftDb[day] || {}).forEach(function(shift) {
      var members = shiftDb[day][shift];
      if (members && members.length) { dbPut('/schicht/' + dstKey + '/' + day + '/' + shift, members); count++; }
    });
  });
  toast('✓ Auf nächste Woche kopiert (' + count + ' Schichten)');
  shiftOff++; loadShift();
}
function loadShift() {
  var key = weekKey(shiftOff);
  el('shLabel').textContent = 'KW ' + key.split('-W')[1];
  dbGet('/schicht/' + key, function(err, data) { shiftDb = data || {}; renderShift(); });
}
function renderShift() {
  var html = ''; var key = weekKey(shiftOff);
  var dates = getWeekDates(shiftOff);
  var todayStr = todayKey();
  DAYS_DE.forEach(function(day, idx) {
    var dd = shiftDb[day] || {};
    var date = dates[idx];
    var dateStr = date.getFullYear() + '-' + String(date.getMonth()+1).padStart(2,'0') + '-' + String(date.getDate()).padStart(2,'0');
    var isToday = dateStr === todayStr;
    var dateLabel = String(date.getDate()) + '.' + String(date.getMonth()+1) + '.';
    var rows = '';
    SCHICHTEN.forEach(function(s) {
      var members = dd[s.k] || [];
      var names = members.length ? members.map(function(n) { return n === me ? '<span style="color:var(--gold);font-weight:500">' + esc(n) + '</span>' : esc(n); }).join(', ') : '<span style="color:var(--bg4)">–</span>';
      rows += '<div class="sd-row" data-day="' + day + '" data-shift="' + s.k + '">' +
        '<span>' + s.l + ' <span class="sd-badge">' + s.t + '</span></span>' +
        '<span class="sd-names">' + names + '</span></div>';
    });
    html += '<div class="sd' + (isToday ? ' today' : '') + '">' +
      '<div class="sd-name">' + day + ' <span style="font-weight:300;opacity:0.55;font-size:0.65rem">' + dateLabel + '</span>' +
      (isToday ? ' <span style="font-size:0.5rem;background:var(--gold);color:#000;border-radius:4px;padding:0.05rem 0.3rem;vertical-align:middle;margin-left:0.2rem">heute</span>' : '') +
      '</div>' + rows + '</div>';
  });
  el('shiftGrid').innerHTML = html;
  el('shiftGrid').querySelectorAll('.sd-row').forEach(function(row) {
    row.addEventListener('click', function() { editShiftSlot(key, row.dataset.day, row.dataset.shift); });
  });
}
function editShiftSlot(weekKey, day, shiftKey) {

function showBestellen() {
  var body = makeOv('Bestellliste');
  function render() {
    body.innerHTML = '';
    var addForm = document.createElement('div');
    addForm.className = 'add-form open';
    addForm.innerHTML =
      '<div class="fg"><label class="fl">Artikel</label><input class="inp" id="oName" placeholder="z.B. Mehl"></div>' +
      '<div class="fg"><label class="fl">Menge</label><input class="inp" id="oQty" placeholder="z.B. 5 kg"></div>' +
      '<button class="btn-g" style="width:100%" id="oSave">Hinzufügen</button>';
    body.appendChild(addForm);
    addForm.querySelector('#oSave').addEventListener('click', function() {
      var name = addForm.querySelector('#oName').value.trim();
      if (!name) { toast('Bitte Artikel eingeben'); return; }
      var qty = addForm.querySelector('#oQty').value.trim();
      dbPost('/orders', {name:name, qty:qty, by:me, ts:Date.now()}, function(err, key) {
        addForm.querySelector('#oName').value = '';
        addForm.querySelector('#oQty').value = '';
        loadOrdersInto(body);
        toast('✓ Hinzugefügt');
        loadOrders();
      });
    });
    loadOrdersInto(body);
  }
  function loadOrdersInto(container) {
    dbGet('/orders', function(err, data) {
      var list = container.querySelector('#ovOrderList');
      if (!list) { list = document.createElement('div'); list.id = 'ovOrderList'; container.appendChild(list); }
      orders = [];
      if (data && !err) {
        Object.keys(data).forEach(function(k) { var o = data[k]; o.id = k; orders.push(o); });
        orders.sort(function(a,b) { return (b.ts||0)-(a.ts||0); });
      }
      if (!orders.length) { list.innerHTML = '<p class="empty">Liste ist leer</p>'; updateDash(); return; }
      list.innerHTML = '';
      var pending = orders.filter(function(o) { return !o.ordered; });
      var done    = orders.filter(function(o) { return  o.ordered; });
      function makeOrderRow(o) {
        var div = document.createElement('div');
        div.className = 'order' + (o.ordered ? ' ordered' : '');
        div.innerHTML =
          '<div style="flex:1">' +
            '<div class="o-name" style="' + (o.ordered ? 'text-decoration:line-through;opacity:0.5' : '') + '">' + esc(o.name) + '</div>' +
            '<div class="o-qty">' + esc(o.qty||'') + (o.by ? ' · ' + esc(o.by) : '') + '</div>' +
          '</div>' +
          '<button class="qty-btn" style="margin-right:0.35rem;color:' + (o.ordered?'var(--green)':'var(--dim)') + '">' + (o.ordered ? '✓' : '○') + '</button>' +
          '<button class="del">✕</button>';
        div.querySelector('.qty-btn').addEventListener('click', function() {
          o.ordered = !o.ordered;
          dbPut('/orders/' + o.id, o, function() { loadOrdersInto(container); loadOrders(); });
        });
        div.querySelector('.del').addEventListener('click', function() {
          confirmDel('"' + o.name + '" löschen?', function() { dbDel('/orders/' + o.id, function() { loadOrdersInto(container); loadOrders(); }); });
        });
        list.appendChild(div);
      }
      pending.forEach(makeOrderRow);
      if (done.length) {
        var doneHdr = document.createElement('p');
        doneHdr.style.cssText = 'font-size:0.62rem;color:var(--dim);text-transform:uppercase;letter-spacing:0.04em;margin:0.6rem 0 0.3rem';
        doneHdr.textContent = 'Bestellt';
        list.appendChild(doneHdr);
        done.forEach(makeOrderRow);
      }
      updateDash();
    });
  }
  render();
}
function loadOrders() {
  dbGet('/orders', function(err, data) {
    orders = [];
    if (data && !err) {
      Object.keys(data).forEach(function(k) { var o = data[k]; o.id = k; orders.push(o); });
    }
    updateDash();
  });
}

/* ── ÜBERGABE ── */
function showUebergabe() {
  var body = makeOv('Übergabe');
  var today = todayKey();
  body.innerHTML = '<p style="font-size:0.72rem;color:var(--dim);margin-bottom:0.75rem">Heute · ' + today + '</p>' +
    '<div class="fg"><textarea class="inp" id="uText" placeholder="Was gibt es zu übergeben? Besonderheiten, offene Aufgaben, Hinweise…" style="min-height:140px"></textarea></div>' +
    '<button class="btn-g" style="width:100%" id="uSave">Speichern</button>' +
    '<div id="uHistory" style="margin-top:1.5rem"></div>';
  if (me) { dbPut('/uebergabe_read/' + today + '/' + me, {ts:Date.now()}); }
  dbGet('/uebergabe', function(err, data) {
    if (data && data[today] && data[today].text) {
      body.querySelector('#uText').value = data[today].text;
    }
    var history = body.querySelector('#uHistory');
    if (data) {
      var keys = Object.keys(data).sort().reverse().filter(function(k) { return k !== today; }).slice(0,5);
      if (keys.length) {
        history.innerHTML = '<p style="font-size:0.7rem;font-weight:600;color:var(--gold);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:0.5rem">Frühere Einträge</p>';
        keys.forEach(function(k) {
          var e = data[k];
          var d = document.createElement('div');
          d.className = 'card';
          d.innerHTML = '<div style="font-size:0.65rem;color:var(--dim);margin-bottom:0.35rem">' + esc(k) + ' · ' + esc(e.by||'?') + '</div>' +
            '<div style="font-size:0.85rem;white-space:pre-wrap">' + esc(e.text||'') + '</div>';
          history.appendChild(d);
        });
      }
    }
  });
  body.querySelector('#uSave').addEventListener('click', function() {
    var text = body.querySelector('#uText').value.trim();
    if (!text) { toast('Bitte Text eingeben'); return; }
    dbPut('/uebergabe/' + today, {text:text, by:me, ts:Date.now()}, function() {
      toast('✓ Übergabe gespeichert');
    });
  });
}

var HACCP = [
  {id:'kuehlschrank', label:'Kühlschrank Temperatur', hint:'Muss unter +7°C sein'},
  {id:'tiefkuehl',    label:'Tiefkühlschrank',        hint:'Muss unter -18°C sein'},
  {id:'haende',       label:'Händehygiene',           hint:'Alle Mitarbeiter informiert'},
  {id:'ablaufdaten',  label:'Ablaufdaten geprüft',    hint:'Alle Produkte kontrolliert'},
  {id:'beschriftung', label:'Lebensmittel beschriftet',hint:'Datum & Inhalt vorhanden'},
  {id:'reinigung_ok', label:'Küchenreinigung',        hint:'Alle Flächen gereinigt'},
  {id:'temp_speise',  label:'Speisen-Temperatur',     hint:'Warmhalten über +65°C'},
];
function showHaccp() {
  var body = makeOv('HACCP – ' + todayKey());
  var today = todayKey();
  dbGet('/haccp/' + today, function(err, data) {
    data = data || {};
    body.innerHTML = '<p style="font-size:0.72rem;color:var(--dim);margin-bottom:0.75rem">Täglich prüfen und abhaken</p>';
    HACCP.forEach(function(item) {
      var entry = data[item.id] || {};
      var checked = !!entry.checked;
      var div = document.createElement('div');
      div.className = 'cl-item' + (checked ? ' checked' : '');
      div.innerHTML =
        '<div class="cl-box">' + (checked ? '✓' : '') + '</div>' +
        '<div class="cl-text"><div class="cl-label">' + esc(item.label) + '</div>' +
          '<div class="cl-hint">' + esc(item.hint) + '</div>' +
          (checked && entry.by ? '<div class="cl-who">✓ ' + esc(entry.by) + ' ' + fmtTime(entry.ts||0) + '</div>' : '') +
        '</div>';
      div.addEventListener('click', function() {
        var isNow = !entry.checked;
        entry.checked = isNow; entry.by = me; entry.ts = Date.now();
        data[item.id] = entry;
        dbPut('/haccp/' + today + '/' + item.id, entry);
        div.className = 'cl-item' + (isNow ? ' checked' : '');
        div.querySelector('.cl-box').textContent = isNow ? '✓' : '';
        div.querySelector('.cl-label').style.textDecoration = isNow ? 'line-through' : '';
        var whoEl = div.querySelector('.cl-who');
        if (isNow) {
          if (!whoEl) { whoEl = document.createElement('div'); whoEl.className = 'cl-who'; div.querySelector('.cl-text').appendChild(whoEl); }
          whoEl.textContent = '✓ ' + me + ' ' + fmtTime(Date.now());
        } else { if (whoEl) whoEl.remove(); }
      });
      body.appendChild(div);
    });
    var done = Object.keys(data).filter(function(k) { return data[k] && data[k].checked; }).length;
    var allDone = done >= HACCP.length;
    var prog = document.createElement('div');
    prog.style.cssText = 'border-radius:12px;padding:0.75rem 1rem;margin-top:0.75rem;text-align:center;font-size:0.85rem;' +
      (allDone ? 'background:rgba(76,175,125,0.12);border:1px solid var(--green);color:var(--green);font-weight:600' : 'background:var(--bg2);border:1px solid var(--border);color:var(--dim)');
    prog.textContent = allDone ? '✓ Alle Checks erledigt!' : done + ' / ' + HACCP.length + ' erledigt';
    body.appendChild(prog);
  });
}

  {id:'wcs',           label:'Toiletten',          freq:'täglich'},
